<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>N-Z0 · Prototype corrigé</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            min-height: 100vh;
            background: #fff;
            font-family: Inter, system-ui, sans-serif;
            color: #071c3f;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px 12px 38px;
            gap: 16px
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            border: 1px solid #e7edf5;
            border-radius: 999px;
            padding: 8px 10px;
            background: #fff;
            box-shadow: 0 12px 34px rgba(2, 22, 59, .08)
        }

        button {
            font: inherit
        }

        .ctrl {
            border: 0;
            border-radius: 999px;
            background: #f2f5f8;
            color: #516176;
            font-size: 12px;
            font-weight: 800;
            padding: 9px 12px;
            cursor: pointer
        }

        .ctrl.on, .ctrl:hover {
            background: #02163b;
            color: white
        }

        .ctrl.brand {
            background: rgba(1, 187, 186, .12);
            color: #008984
        }

        .phone {
            width: 390px;
            height: 812px;
            background: #10141d;
            border-radius: 52px;
            padding: 12px;
            position: relative;
            box-shadow: 0 30px 90px rgba(2, 22, 59, .18)
        }

        .phone:before {
            content: "";
            position: absolute;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 118px;
            height: 34px;
            background: #05070b;
            border-radius: 999px;
            z-index: 50
        }

        .screen {
            height: 100%;
            border-radius: 42px;
            overflow: hidden;
            position: relative
        }

        .dark {
            --bg: #06152c;
            --card: #0c2346;
            --card2: #122d55;
            --text: #f3f8ff;
            --muted: #91a3bd;
            --line: #1c3a62;
            --nav: #071b38;
            --chip: rgba(1, 187, 186, .13);
            --shadow: 0 16px 38px rgba(0, 0, 0, .22)
        }

        .light {
            --bg: #ffffff;
            --card: #ffffff;
            --card2: #f5f5f5;
            --text: #0a0a0a;
            --muted: #5a5a5a;
            --line: #e8e8e8;
            --nav: #ffffff;
            --chip: rgba(1, 187, 186, .09);
            --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.06)
        }

        /* Bottom navigation light */
        .light .nav {
            background: #ffffff;
            box-shadow: none;
            border: 0;
            border-top: 1px solid #ebebeb;
        }

        .light .header {
            background: #ffffff;
            border-bottom: 1px solid #ebebeb;
        }

        .light .header .logo {
            width: 129.6px;
            height: 67.2px;
        }

        .light .card {
            background: #ffffff;
            border: 1px solid #ebebeb;
            box-shadow: none;
        }

        .light .act,
        .light .quick-action,
        .light .quick-action.featured,
        .light .home-offer-card,
        .light .offer-card,
        .light .offer-card.sell-mode {
            background: #ffffff;
            border: 1px solid #ebebeb;
            box-shadow: none;
        }

        /* Champs de formulaire light */
        .light .auth-input,
        .light .field input,
        .light .field select {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            color: #0a0a0a;
        }

        .light .auth-input:focus-within {
            background: #ffffff;
            border-color: #01bbba;
            box-shadow: 0 0 0 3px rgba(1,187,186,.10);
        }

        /* Chips et tags brand en light */
        .light .pill.teal,
        .light .tag {
            background: rgba(1, 187, 186, .09);
            color: #007a79;
        }

        .light .filter-chip,
        .light .xfilter,
        .light .xchange-filter-picker {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            color: #0a0a0a;
            box-shadow: none;
        }

        .light .filter-chip.active,
        .light .xfilter.active,
        .light .xchange-filter-picker[open] {
            background: rgba(1,187,186,.10);
            border: 1px solid rgba(1,187,186,.25);
            color: #008080;
            box-shadow: none;
        }

        .light .xfilter-menu[open],
        .light .xfilter-menu.active[open] {
            background: #ffffff;
            border: 1px solid #ebebeb;
            color: #0a0a0a;
            box-shadow: none;
        }

        .light .xfilter-options {
            border-top: none;
        }

        .light .note {
            background: rgba(1, 187, 186, .07);
            color: #007a79;
            border: 1px solid rgba(1,187,186,.15);
        }

        /* Badges statut light */
        .light .tag.warn {
            background: rgba(245, 158, 11, .09);
            color: #854d0e;
        }

        .light .tag.lock {
            background: rgba(239, 68, 68, .09);
            color: #991b1b;
        }

        /* Séparateurs light */
        .light .auth-divider:before,
        .light .auth-divider:after {
            background: #e0e0e0;
        }

        /* Textes muted light - minimum lisible */
        .light .sub,
        .light .hello,
        .light .caption,
        .light .balance-caption {
            color: #5a5a5a;
        }

        .light .section {
            color: #999999;
            font-size: 11px;
            letter-spacing: .05em;
            text-transform: uppercase;
        }

        /* NzoPX picker dropdown light */
        .light .nzone-picker-options {
            background: #ffffff;
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,.10);
        }

        /* Bottom sheets light */
        .light .xsheet,
        .light .profile-sheet,
        .light .xsheet-panel,
        .light .profile-sheet-panel {
            background: #ffffff;
            border: none;
            border-top: 1px solid #ebebeb;
            box-shadow: 0 -8px 32px rgba(0,0,0,.08);
        }

        .status {
            height: 58px;
            background: var(--nav);
            color: var(--text);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 0 28px 12px;
            font-size: 14px;
            font-weight: 800
        }

        .theme-toggle {
            position: absolute;
            top: 14px;
            right: 88px;
            width: 32px;
            height: 32px;
            border: 1px solid transparent;
            border-radius: 999px;
            display: grid;
            place-items: center;
            padding: 0;
            cursor: pointer;
            z-index: 76;
            backdrop-filter: blur(10px);
            transition: .22s ease;
            box-shadow: 0 10px 24px rgba(0, 0, 0, .14)
        }

        .dark .theme-toggle {
            background: rgba(7, 27, 56, .82);
            border-color: rgba(145, 163, 189, .18);
            color: #f5f8ff
        }

        .light .theme-toggle {
            background: #ffffff;
            border-color: #ebebeb;
            color: #0a0a0a;
            box-shadow: none
        }

        .theme-toggle.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px) scale(.92)
        }

        .theme-toggle-icon {
            font-size: 15px;
            line-height: 1
        }

        .battery {
            display: inline-block;
            width: 23px;
            height: 11px;
            border: 1.5px solid var(--text);
            border-radius: 4px;
            margin-left: 6px;
            position: relative
        }

        .battery:after {
            content: "";
            position: absolute;
            right: -4px;
            top: 3px;
            width: 2px;
            height: 5px;
            background: var(--text);
            border-radius: 2px
        }

        .battery i {
            display: block;
            width: 14px;
            height: 7px;
            background: #01bbba;
            border-radius: 2px;
            margin: 1px
        }

        .app {
            height: calc(100% - 58px);
            background: var(--bg);
            position: relative;
            overflow: hidden;
            color: var(--text)
        }

        .view {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            overflow-y: hidden;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x pan-y;
            scrollbar-width: none;
            padding-bottom: 94px
        }

        .view.active {
            display: flex
        }

        .view.can-scroll {
            overflow-y: auto;
            scroll-behavior: smooth
        }

        .view > * {
            flex-shrink: 0
        }

        .view::-webkit-scrollbar {
            width: 0
        }

        .header {
            padding: 22px 18px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .header-copy {
            flex: 1;
            min-width: 0;
            padding-right: 12px
        }

        .hello {
            font-size: 13px;
            color: var(--muted);
            font-weight: 700
        }

        .title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -.04em;
            color: var(--text)
        }

        .logo {
            width: 108px;
            height: 56px;
            object-fit: cover;
            object-position: center;
            border-radius: 14px;
            flex: none
        }

        .logo.big {
            width: 280px;
            height: 180px;
            object-fit: cover;
            object-position: center;
            border-radius: 28px
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 16px;
            background: linear-gradient(135deg, #01bbba, #78ffdf);
            color: #062447;
            display: grid;
            place-items: center;
            font-weight: 900
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            border-radius: 24px;
            margin: 0 16px 14px;
            padding: 16px
        }

        .sub {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.55
        }

        .hero {
            background: linear-gradient(160deg, #02163b, #062d62 58%, #064e5b);
            color: white;
            position: relative;
            overflow: hidden
        }

        .hero:after {
            content: "";
            position: absolute;
            right: -55px;
            top: -75px;
            width: 190px;
            height: 190px;
            border: 36px solid rgba(1, 187, 186, .14);
            border-radius: 50%
        }

        .hero > * {
            position: relative;
            z-index: 1
        }

        .balance-topline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            color: rgba(255, 255, 255, .72);
            font-size: 13px;
            font-weight: 800
        }

        .balance-tabs {
            display: inline-flex;
            gap: 5px;
            padding: 4px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .12)
        }

        .balance-tab {
            border: 0;
            border-radius: 999px;
            padding: 6px 9px;
            background: transparent;
            color: rgba(255, 255, 255, .68);
            font-size: 10px;
            font-weight: 900;
            cursor: pointer;
            transition: .2s ease
        }

        .balance-tab.active {
            background: #01bbba;
            color: #032034
        }

        .balance-caption {
            margin-top: 4px;
            color: rgba(255, 255, 255, .68);
            font-size: 12px;
            font-weight: 750
        }

        .balance-country {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 7px;
            padding: 7px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .1);
            color: rgba(255, 255, 255, .82);
            font-size: 12px;
            font-weight: 850
        }

        .balance-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px
        }

        .amount {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -.05em;
            margin-top: 6px;
            white-space: nowrap
        }

        .pill {
            display: inline-flex;
            padding: 8px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .13);
            font-size: 11px;
            font-weight: 900;
            color: inherit;
            margin-top: 12px;
            margin-right: 6px
        }

        /* Hero card accueil — version light lisible sur blanc */
        .light .card.hero {
            background: #ffffff !important;
            color: var(--text) !important;
            border: 1px solid #ebebeb !important;
            box-shadow: none !important
        }

        /* Textes internes du hero en light */
        .light .card.hero .balance-topline,
        .light .card.hero .balance-topline span,
        .light .card.hero .balance-tab,
        .light .card.hero .balance-country {
            color: var(--muted) !important
        }

        .light .card.hero .amount,
        .light .card.hero .pill {
            color: var(--text) !important
        }

        /* Pills/chips de devise dans le hero */
        .light .card.hero .balance-tabs {
            background: #f5f5f5 !important;
            border: 1px solid #e0e0e0 !important
        }

        .light .card.hero .balance-tab {
            background: transparent !important;
            color: var(--muted) !important
        }

        /* Pill/chip active (devise sélectionnée) */
        .light .card.hero .balance-tab.active,
        .light .card.hero .pill.active {
            background: #01bbba !important;
            color: #ffffff !important
        }

        /* Badge pays et badge KYC dans le hero */
        .light .card.hero .balance-country,
        .light .card.hero .pill {
            background: #f5f5f5 !important;
            color: var(--text) !important;
            border: 1px solid #e0e0e0 !important
        }

        .pill.teal, .tag {
            background: var(--chip);
            color: #01bbba
        }

        .tag {
            padding: 6px 9px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 900
        }

        .tag.warn {
            background: rgba(245, 158, 11, .13);
            color: #d97706
        }

        .tag.lock {
            background: rgba(239, 68, 68, .12);
            color: #ef4444
        }

        .note {
            margin: 0 16px 14px;
            padding: 12px 14px;
            border-radius: 18px;
            background: var(--chip);
            color: #01bbba;
            font-size: 12px;
            font-weight: 800;
            line-height: 1.45
        }

        .actions {
            display: grid;
            grid-template-columns:repeat(4, 1fr);
            gap: 10px;
            margin: 0 16px 16px
        }

        .act {
            background: var(--card);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            border-radius: 20px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer
        }

        .act b {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border-radius: 15px;
            background: var(--chip);
            margin: 0 auto 8px;
            color: #01bbba;
            font-size: 20px
        }

        .act span {
            font-size: 11px;
            font-weight: 900;
            color: var(--text)
        }

        .quick-actions {
            display: grid;
            grid-template-columns:1fr 1fr;
            gap: 10px;
            margin: 0 16px 16px
        }

        .quick-actions.home-actions {
            grid-template-columns:1fr 1fr
        }

        .quick-action {
            min-height: 82px;
            border: 1px solid var(--line);
            border-radius: 24px;
            background: linear-gradient(145deg, color-mix(in srgb, var(--card) 94%, #01bbba 6%), var(--card));
            color: var(--text);
            box-shadow: var(--shadow);
            padding: 13px;
            display: flex;
            align-items: center;
            gap: 11px;
            text-align: left;
            cursor: pointer
        }

        .quick-action.featured {
            grid-column: 1 / -1;
            min-height: 76px;
            background: linear-gradient(135deg, rgba(1, 187, 186, .28), var(--card));
            border-color: rgba(1, 187, 186, .34)
        }

        .quick-action b {
            width: 38px;
            height: 38px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: var(--chip);
            color: #01bbba;
            font-size: 19px;
            flex: none
        }

        .quick-action-copy {
            min-width: 0
        }

        .quick-action span {
            display: block;
            font-size: 13px;
            font-weight: 900;
            line-height: 1.15
        }

        .quick-action small {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 10px;
            font-weight: 750;
            line-height: 1.25
        }

        .market-card {
            width: calc(100% - 32px);
            margin: 0 16px 16px;
            padding: 17px;
            border: 1px solid rgba(1, 187, 186, .32);
            border-radius: 28px;
            background: radial-gradient(circle at 90% 0, rgba(1, 187, 186, .26), transparent 38%), linear-gradient(145deg, color-mix(in srgb, var(--card) 86%, #01bbba 14%), var(--card));
            color: var(--text);
            box-shadow: var(--shadow);
            cursor: pointer;
            display: block;
            text-align: left;
            font: inherit;
            overflow: hidden;
            position: relative
        }

        .market-card:after {
            content: "";
            position: absolute;
            right: -42px;
            bottom: -58px;
            width: 150px;
            height: 150px;
            border: 28px solid rgba(1, 187, 186, .1);
            border-radius: 50%
        }

        .market-main {
            display: flex;
            gap: 13px;
            align-items: flex-start;
            position: relative;
            z-index: 1
        }

        .market-mark {
            width: 48px;
            height: 48px;
            border-radius: 18px;
            background: #01bbba;
            color: #032034;
            display: grid;
            place-items: center;
            font-size: 24px;
            font-weight: 950;
            flex: none
        }

        .market-kicker {
            display: block;
            color: #01bbba;
            font-size: 11px;
            font-weight: 950;
            letter-spacing: .05em;
            text-transform: uppercase
        }

        .market-title {
            margin-top: 4px;
            color: var(--text);
            font-size: 20px;
            line-height: 1.05;
            font-weight: 950;
            letter-spacing: -.04em
        }

        .market-copy {
            margin-top: 7px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
            font-weight: 750
        }

        .market-cta {
            margin-top: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #01bbba;
            font-size: 12px;
            font-weight: 950;
            position: relative;
            z-index: 1
        }

        .market-offers {
            display: grid;
            gap: 7px;
            margin-top: 14px;
            position: relative;
            z-index: 1
        }

        .market-offer {
            display: grid;
            grid-template-columns:auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 8px;
            padding: 9px 10px;
            border: 1px solid rgba(1, 187, 186, .14);
            border-radius: 16px;
            background: color-mix(in srgb, var(--card) 74%, var(--chip) 26%)
        }

        .market-offer-type {
            padding: 5px 7px;
            border-radius: 999px;
            background: var(--chip);
            color: #01bbba;
            font-size: 9px;
            font-weight: 950
        }

        .market-offer b {
            display: block;
            color: var(--text);
            font-size: 11px;
            font-weight: 950;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .market-offer small {
            display: block;
            margin-top: 2px;
            color: var(--muted);
            font-size: 9px;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .market-offer-rate {
            color: var(--text);
            font-size: 11px;
            font-weight: 950;
            white-space: nowrap
        }

        .section-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 6px 18px 10px
        }

        .section-row .section {
            margin: 0
        }

        .section-link {
            border: 0;
            padding: 0;
            background: transparent;
            color: #01bbba;
            font: inherit;
            font-size: 12px;
            font-weight: 950;
            cursor: pointer
        }

        .home-xchange-shell {
            margin-bottom: 16px
        }

        .home-offers-carousel {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 0 16px 4px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none
        }

        .home-offers-carousel::-webkit-scrollbar {
            display: none
        }

        .home-offers-slide {
            flex: 0 0 calc(100% - 32px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            scroll-snap-align: start
        }

        .home-offer-card {
            min-width: 0;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--card);
            box-shadow: var(--shadow)
        }

        .home-offer-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px
        }

        .home-offer-top {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .home-offer-avatar {
            width: 38px;
            height: 38px;
            border-radius: 14px;
            background: var(--chip);
            color: #01bbba;
            display: grid;
            place-items: center;
            font-size: 12px;
            font-weight: 950;
            flex: none
        }

        .home-offer-peer {
            min-width: 0
        }

        .home-offer-peer b {
            display: block;
            color: var(--text);
            font-size: 12px;
            font-weight: 950;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .home-offer-peer span {
            display: block;
            margin-top: 2px;
            color: var(--muted);
            font-size: 10px;
            font-weight: 850;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .home-offer-intent {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 950;
            white-space: nowrap;

        }

        }

        }

        }

            }
        }

        @keyframes splashLoad {
            from {
                transform: translateX(-135%)
            }
            to {
                transform: translateX(285%)
            }
        }

        .spacer {
            flex: 1
        }

        .social {
            display: flex;
            gap: 10px
        }

        .social .btn {
            flex: 1;
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--line)
        }

        .empty {
            height: 100%;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 28px
        }

        .caption {
            font-size: 11px;
            color: #94a3b8;
            text-align: center
        }

            .phone {
                width: 360px;
                height: 760px
            }

    function currentLang() {
        return profileState.lang === 'EN' ? 'EN' : 'FR'

    function translateAppText(text) {
        if (!text || currentLang() !== 'EN') return text;
        let output = I18N_EN_EXACT[text] || text;
        I18N_EN_PATTERNS.forEach(([pattern, replacement]) => {
            output = output.replace(pattern, replacement)
        });
        return output
    }

    function applyAppLanguage() {
        const lang = currentLang();
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
            acceptNode(node) {
                if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
                const parent = node.parentElement;
                if (!parent || ['SCRIPT', 'STYLE'].includes(parent.tagName)) return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT
            }
        });
        const nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(node => {
            const rendered = node.nodeValue;
            if (lang === 'EN') {
                const source = node.__i18nSource && node.__i18nTranslated === rendered ? node.__i18nSource : rendered;
                node.__i18nSource = source;
                node.__i18nTranslated = translateAppText(source);
                node.nodeValue = node.__i18nTranslated
            } else if (node.__i18nSource && node.__i18nTranslated === rendered) {
                node.nodeValue = node.__i18nSource
            }
        });
        document.querySelectorAll('[placeholder],[title],[aria-label]').forEach(element => {
            element.__i18nAttrs = element.__i18nAttrs || {};
            ['placeholder', 'title', 'aria-label'].forEach(attr => {
                if (!element.hasAttribute(attr)) return;
                const rendered = element.getAttribute(attr);
                if (lang === 'EN') {
                    const source = element.__i18nAttrs[attr] && element.__i18nAttrs[`${attr}Translated`] === rendered ? element.__i18nAttrs[attr] : rendered;
                    element.__i18nAttrs[attr] = source;
                    element.__i18nAttrs[`${attr}Translated`] = translateAppText(source);
                    element.setAttribute(attr, element.__i18nAttrs[`${attr}Translated`])
                } else if (element.__i18nAttrs[attr] && element.__i18nAttrs[`${attr}Translated`] === rendered) {
                    element.setAttribute(attr, element.__i18nAttrs[attr])
                }
            })
        })
    }

    function hasCompletedOnboarding() {

    function onboardingDots() {
        return ONBOARDING_SLIDES.map((_, index) => `<button class="onb-dot" type="button" data-onb-dot="${index}" onclick="goOnboardingSlide(${index})" aria-label="Aller à l’étape ${index + 1}"></button>`).join('')
    }

    function buildOnboardingSlides() {
        const track = document.querySelector('#onboarding .onb-track');
        const lastIndex = ONBOARDING_SLIDES.length - 1;
        track.innerHTML = ONBOARDING_SLIDES.map((slide, index) => {
            const skip = index < lastIndex ? `<button class="onb-skip" type="button" onclick="completeOnboarding('login')">Passer</button>` : '';
            const footer = index === lastIndex
                ? `<div class="onb-footer final"><div class="onb-dots">${onboardingDots()}</div><button class="onb-final-primary" type="button" onclick="completeOnboarding('signup')">Créer mon compte</button><button class="onb-login-link" type="button" onclick="completeOnboarding('login')">J’ai déjà un compte</button></div>`
                : `<div class="onb-footer"><div class="onb-dots">${onboardingDots()}</div><button class="onb-next" type="button" onclick="nextOnboardingSlide()">Suivant →</button></div>`;
            return `<section class="onb-slide" aria-label="${slide.title}"><div class="onb-bg" aria-hidden="true"></div>${skip}<div class="onb-content"><div class="onb-icon" aria-hidden="true">${slide.icon}</div><div><h2 class="onb-title">${slide.title}</h2><p class="onb-subtitle">${slide.subtitle}</p></div></div>${footer}</section>`
        }).join('');
        onboardingBuilt = true;
        applyOnboardingBackgrounds()
    }

    function applyOnboardingBackgrounds() {
        document.querySelectorAll('.onb-slide').forEach((slide, index) => {
            const image = onboardingBackgrounds[index];
            const background = image ? `url("${image}")` : SLIDE_FALLBACK_GRADIENTS[index];
            slide.style.setProperty('--onb-bg', background)
        })
    }

    function updateOnboarding(index) {
        const lastIndex = ONBOARDING_SLIDES.length - 1;
        onboardingIndex = Math.max(0, Math.min(lastIndex, index));
        const track = document.querySelector('#onboarding .onb-track');
        if (track) track.style.transform = `translateX(${-100 * onboardingIndex}%)`;
        document.querySelectorAll('.onb-dot').forEach(dot => {
            dot.classList.toggle('active', Number(dot.dataset.onbDot) === onboardingIndex)
        })
    }

    function nextOnboardingSlide() {
        if (onboardingIndex >= ONBOARDING_SLIDES.length - 1) {
            completeOnboarding('signup');
            return
        }
        updateOnboarding(onboardingIndex + 1)
    }

    function goOnboardingSlide(index) {
        updateOnboarding(index)
    }

    function completeOnboarding(mode = 'login') {
        markOnboardingComplete();
        closeOnboarding();
        showAuth(mode === 'signup' ? 'signup' : 'login')
    }

    function closeOnboarding() {
        const onboarding = document.getElementById('onboarding');
        if (onboarding) onboarding.classList.remove('active')
    }

    function setupOnboardingGestures() {
        const onboarding = document.getElementById('onboarding');
        if (!onboarding || onboarding.dataset.gestures === 'ready') return;
        onboarding.dataset.gestures = 'ready';
        onboarding.addEventListener('touchstart', event => {
            if (!onboarding.classList.contains('active')) return;
            const touch = event.changedTouches[0];
            onboardingTouchStartX = touch.clientX;
            onboardingTouchStartY = touch.clientY
        }, {passive: true});
        onboarding.addEventListener('touchend', event => {
            if (!onboarding.classList.contains('active')) return;
            const touch = event.changedTouches[0];
            const deltaX = touch.clientX - onboardingTouchStartX;
            const deltaY = touch.clientY - onboardingTouchStartY;
            if (Math.abs(deltaX) < 42 || Math.abs(deltaX) < Math.abs(deltaY) * 1.2) return;
            if (deltaX < 0) nextOnboardingSlide();
            else updateOnboarding(onboardingIndex - 1)
        }, {passive: true})
    }

    async function captureOnboardingBackground(route) {
        const root = document.createElement('div');
        root.className = 'onb-capture-root';
        root.style.width = `${screen.clientWidth || 366}px`;
        root.style.height = `${screen.clientHeight || 788}px`;
        root.innerHTML = onboardingCaptureMarkup(route);
        document.body.appendChild(root);
        root.querySelectorAll('.logo,[data-logo]').forEach(image => image.src = L());
        await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        try {
            const canvas = await window.html2canvas(root.querySelector('.screen'), {
                backgroundColor: null,
                logging: false,
                scale: Math.min(2, window.devicePixelRatio || 1),
                useCORS: true
            });
            return canvas.toDataURL('image/png')
        } finally {
            root.remove()
        }
    }

    async function prepareOnboardingBackgrounds() {
        if (onboardingCaptureStarted || typeof window.html2canvas !== 'function') return;
        onboardingCaptureStarted = true;
        for (let index = 0; index < ONBOARDING_SLIDES.length; index++) {
            if (!document.getElementById('onboarding').classList.contains('active')) break;
            try {
                const image = await captureOnboardingBackground(ONBOARDING_SLIDES[index].route);
                if (image) {
                    onboardingBackgrounds[index] = image;
                    applyOnboardingBackgrounds()
                }
            } catch (error) {
                onboardingBackgrounds[index] = ''
            }
        }
    }

    function populateBirthDateSelects() {
        const daySelect = document.getElementById('signupBirthDay');
        const yearSelect = document.getElementById('signupBirthYear');
        if (daySelect && daySelect.options.length <= 1) {
            for (let day = 1; day <= 31; day++) {
                const value = String(day).padStart(2, '0');
                daySelect.insertAdjacentHTML('beforeend', `<option value="${value}">${day}</option>`)
            }
        }
        if (yearSelect && yearSelect.options.length <= 1) {
            for (let year = new Date().getFullYear(); year >= 1920; year--) {
                yearSelect.insertAdjacentHTML('beforeend', `<option value="${year}">${year}</option>`)
            }
        }
    }

    function signupBirthValue() {
        const day = document.getElementById('signupBirthDay').value;
        const month = document.getElementById('signupBirthMonth').value;
        const year = document.getElementById('signupBirthYear').value;
        if (!day || !month || !year) return '';
        const date = new Date(Number(year), Number(month) - 1, Number(day));
        const valid = date.getFullYear() === Number(year) && date.getMonth() === Number(month) - 1 && date.getDate() === Number(day);
        return valid ? `${year}-${month}-${day}` : 'invalid'
    }

    function phoneCountryByKey(key) {
        return AUTH_PHONE_COUNTRIES.find(country => country.key === key) || AUTH_PHONE_COUNTRIES[0]
    }

    function detectPhoneCountry() {
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
        const locale = ((navigator.languages && navigator.languages[0]) || navigator.language || '').toLowerCase();
        const timezoneMatch = AUTH_PHONE_COUNTRIES.find(country => country.timezones.includes(timezone));
        if (timezoneMatch) return timezoneMatch.key;
        const localeMatch = AUTH_PHONE_COUNTRIES.find(country => country.locales.includes(locale));
        return localeMatch ? localeMatch.key : 'CM'
    }

    function currentPhoneCountry() {
        return phoneCountryByKey(authPhoneCountry)
    }

    function formatLocalPhone(value, country = currentPhoneCountry()) {
        const digits = value.replace(/\D/g, '').slice(0, country.maxDigits);
        let cursor = 0;
        const chunks = [];
        country.groups.forEach(size => {
            if (cursor >= digits.length) return;
            chunks.push(digits.slice(cursor, cursor + size));
            cursor += size
        });
        if (cursor < digits.length) chunks.push(digits.slice(cursor));
        return chunks.join(' ')
    }

        phoneOption.setAttribute('aria-pressed', String(isPhone))
    }

    function syncAuthIdentifierUi() {
        const isPhone = authContactType === 'phone';
        const country = currentPhoneCountry();
        const input = document.getElementById('loginIdentifier');
        document.getElementById('identifierLabel').textContent = isPhone ? 'Téléphone' : 'Email';
        document.getElementById('emailPrefix').classList.toggle('auth-hidden', isPhone);
        document.getElementById('phonePrefix').classList.toggle('auth-hidden', !isPhone);
        document.getElementById('phoneCountryFlag').textContent = country.flag;
        document.getElementById('phoneCountrySelect').value = country.key;
        input.type = isPhone ? 'tel' : 'email';
        input.inputMode = isPhone ? 'numeric' : 'email';
        input.autocomplete = isPhone ? 'tel-national' : 'username';
        input.placeholder = isPhone ? country.sample : 'ex. herve@n-z0.app';
        input.value = isPhone ? formatLocalPhone(authContactDrafts.phone, country) : authContactDrafts.email;
        syncContactToggle();
        applyAppLanguage()
    }

    function setAuthContactType(type) {
        if (!['email', 'phone'].includes(type) || authContactType === type) return;
        rememberContactDraft();
        authContactType = type;
        syncAuthIdentifierUi();
        clearAuthError()
    }

    function changePhoneCountry(key) {
        rememberContactDraft();
        authPhoneCountry = phoneCountryByKey(key).key;
        authContactDrafts.phone = formatLocalPhone(authContactDrafts.phone, currentPhoneCountry());
        syncAuthIdentifierUi();
        clearAuthError()
    }

    function handleIdentifierInput(event) {
        clearAuthError();
        if (authContactType === 'phone') event.target.value = formatLocalPhone(event.target.value, currentPhoneCountry());
        authContactDrafts[authContactType] = event.target.value
    }

    function normalizedContactValue() {
        const raw = document.getElementById('loginIdentifier').value.trim();
        if (authContactType === 'phone') {
            const digits = raw.replace(/\D/g, '');
            return digits ? `${currentPhoneCountry().code} ${digits}` : ''
        }
        return raw.toLowerCase()
    }

    function validateIdentifierValue() {
        const raw = document.getElementById('loginIdentifier').value.trim();
        if (authContactType === 'phone') {
            const digits = raw.replace(/\D/g, '');
            if (!digits) return 'Sélectionnez téléphone puis saisissez votre numéro.';
            if (digits.length < 6) return 'Entrez un numéro de téléphone valide.';
            return ''
        }
        if (!raw) return 'Sélectionnez email puis saisissez votre adresse.';
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(raw)) return 'Entrez une adresse email valide.';
        return ''
    }

    function maskContact(value) {
        if (!value) return 'votre contact';
        if (value.includes('@')) {
            const [name, domain] = value.split('@');
            const safe = name.length <= 2 ? `${name[0] || ''}*` : `${name.slice(0, 1)}${'*'.repeat(Math.max(1, Math.min(4, name.length - 2)))}${name.slice(-1)}`;
            return `${safe}@${domain}`
        }
        const compact = value.replace(/\s+/g, '');
        if (compact.length <= 4) return compact;
        return `${compact.slice(0, 4)} ${'•'.repeat(Math.max(4, compact.length - 6))}${compact.slice(-2)}`
    }

    function otpInputs() {
        return [...document.querySelectorAll('.auth-otp-digit')]
    }

    function resetOtpInputs() {
        clearTimeout(otpAutoSubmitTimer);
        otpAutoSubmitTimer = null;
        otpInputs().forEach(input => input.value = '')
    }

    function otpValue() {
        return otpInputs().map(input => input.value).join('')
    }

    function handleOtpInput(event, index) {
        const cleaned = event.target.value.replace(/\D/g, '').slice(-1);
        event.target.value = cleaned;
        clearAuthError();
        if (cleaned && index < otpInputs().length - 1) otpInputs()[index + 1].focus();
        scheduleOtpAutoAdvance()
    }

    function handleOtpKey(event, index) {
        const inputs = otpInputs();
        if (event.key === 'Backspace' && !event.target.value && index > 0) inputs[index - 1].focus();
        if (event.key === 'ArrowLeft' && index > 0) inputs[index - 1].focus();
        if (event.key === 'ArrowRight' && index < inputs.length - 1) inputs[index + 1].focus()
    }

    function handleOtpPaste(event) {
        const digits = (event.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        if (!digits) return;
        event.preventDefault();
        otpInputs().forEach((input, index) => input.value = digits[index] || '');
        clearAuthError();
        otpInputs()[Math.min(digits.length, 5)].focus();
        scheduleOtpAutoAdvance()
    }

    function scheduleOtpAutoAdvance() {
        if (authMode !== 'otp' || otpValue().length < 6) return;
        clearTimeout(otpAutoSubmitTimer);
        otpAutoSubmitTimer = setTimeout(() => {
            if (authMode === 'otp' && otpValue().length === 6) completeOtpVerification()
        }, 180)
    }

    function completeOtpVerification() {
        if (otpValue().length < 6) {
            setAuthMessage('Entrez le code complet.');
            return
        }
        clearAuthError();
        resetOtpInputs();
        if (authOtpSource === 'reset') {
            setAuthMode('login');
            setAuthMessage('Code validé. Vous pouvez vous reconnecter.', 'ok');
            return
        }
        closeAuth();
        if (authOtpSource === 'signup') {
            go('kyc');
            return
        }
        go('home')
    }

            document.getElementById('authSubmitLabel').textContent = 'Se connecter'

            document.getElementById('authSubtitle').textContent = signupInfo ? 'Renseignez votre nom et votre date de naissance.' : 'Ajoutez votre contact, votre mot de passe et validez les conditions.';

    function submitAuth(event) {
        event.preventDefault();
        const fullName = document.getElementById('signupName').value.trim();
        const birthDate = signupBirthValue();
        const password = document.getElementById('loginPassword').value.trim();
        const termsAccepted = document.getElementById('signupTerms').checked;
        const privacyAccepted = document.getElementById('signupPrivacy').checked;
        const identifierError = authMode === 'otp' ? '' : validateIdentifierValue();
        const identifier = normalizedContactValue();

        if (authMode === 'signup' && signupStep === 1) {
            if (!fullName) {
                setAuthMessage('Renseignez votre nom complet pour continuer.');
                return
            }
            if (!birthDate) {
                setAuthMessage('Renseignez votre date de naissance pour continuer.');
                return
            }
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            if (birthDate === 'invalid' || new Date(`${birthDate}T00:00:00`) > today) {
                setAuthMessage('Entrez une date de naissance valide.');
                return
            }
            setSignupStep(2);
            return
        }
        if (authMode === 'signup' && signupStep === 2 && identifierError) {
            setAuthMessage(identifierError);
            return
        }
        if ((authMode === 'login' || authMode === 'forgot') && identifierError) {
            setAuthMessage(identifierError);
            return
        }
        if (authMode === 'signup' && signupStep === 2 && !password) {
            setAuthMessage('Créez un mot de passe pour continuer.');
            return
        }
        if (authMode === 'signup' && signupStep === 2 && (!termsAccepted || !privacyAccepted)) {
            setAuthMessage('Acceptez les CGU et la politique de confidentialité pour créer le compte.');
            return
        }
        if (authMode === 'login' && !password) {
            setAuthMessage('Renseignez votre mot de passe pour continuer.');
            return
        }
        if (authMode === 'otp') {
            completeOtpVerification();
            return
        }

        authPendingContact = identifier;
        authOtpSource = authMode === 'signup' ? 'signup' : authMode === 'forgot' ? 'reset' : 'login';
        setAuthMode('otp')
    }

    function enableHorizontalScrollAssist() {
        document.addEventListener('wheel', event => {
            const strip = event.target.closest('.xzone-slider, .xfilters, .sell-targets, .home-offers-carousel');
            if (!strip) return;
            const maxScroll = strip.scrollWidth - strip.clientWidth;
            if (maxScroll <= 0) return;
            const delta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
            const canScroll = (delta > 0 && strip.scrollLeft < maxScroll) || (delta < 0 && strip.scrollLeft > 0);
            if (!canScroll) return;
            event.preventDefault();
            strip.scrollLeft = Math.max(0, Math.min(maxScroll, strip.scrollLeft + delta))
        }, {passive: false});

        let dragStrip = null, dragStartX = 0, dragStartLeft = 0;
        document.addEventListener('pointerdown', event => {
            const strip = event.target.closest('.xzone-slider, .sell-targets, .home-offers-carousel');
            if (!strip) return;
            dragStrip = strip;
            dragStartX = event.clientX;
            dragStartLeft = strip.scrollLeft;
            strip.classList.add('dragging')
        });
        document.addEventListener('pointermove', event => {
            if (!dragStrip) return;
            dragStrip.scrollLeft = dragStartLeft - (event.clientX - dragStartX)
        });
        ['pointerup', 'pointercancel'].forEach(type => document.addEventListener(type, () => {
            if (!dragStrip) return;
            dragStrip.classList.remove('dragging');
            dragStrip = null
        }))
    }

    function enableXchangeFilterMenus() {
        document.addEventListener('click', event => {
            const option = event.target.closest('.xfilter-options button, .nzone-picker-options button');
            if (option) {
                const menu = option.closest('.xfilter-menu, .nzone-picker');
                if (menu) menu.open = false;
                return
            }
            const summary = event.target.closest('.xfilter-menu summary, .nzone-picker summary');
            if (summary) {
                const menu = summary.parentElement;
                requestAnimationFrame(() => {
                    if (!menu.open) return;
                    document.querySelectorAll('.xfilter-menu[open], .nzone-picker[open]').forEach(other => {
                        if (other !== menu) other.open = false
                    })
                });
                return
            }
            document.querySelectorAll('.xfilter-menu[open], .nzone-picker[open]').forEach(menu => {
                menu.open = false
            })
        })
    }

    }

    function updateHomeOffersPagination(scroller) {
        const shell = scroller.closest('.home-xchange-shell');
        if (!shell) return;
        const slides = [...scroller.querySelectorAll('.home-offers-slide')];
        if (!slides.length) return;
        const mid = scroller.scrollLeft + scroller.clientWidth / 2;
        let active = 0;
        let gap = Number.POSITIVE_INFINITY;
        slides.forEach((slide, index) => {
            const distance = Math.abs(mid - (slide.offsetLeft + slide.offsetWidth / 2));
            if (distance < gap) {
                gap = distance;
                active = index
            }
        });
        shell.querySelectorAll('.home-offers-dot').forEach((dot, index) => dot.classList.toggle('active', index === active))
    }

    function scrollHomeOffersTo(index) {
        const scroller = document.getElementById('homeOffersCarousel');
        if (!scroller) return;
        const slide = scroller.querySelectorAll('.home-offers-slide')[index];
        if (!slide) return;
        scroller.scrollTo({left: slide.offsetLeft, behavior: 'smooth'});
        updateHomeOffersPagination(scroller)
    }

        return type === 'withdraw' ? 'nzoneWithdraw' : type === 'sell' ? 'nzoneSell' : 'nzoneDeposit'
    }

    function defaultNzoneTarget(currency) {
        if (currency === 'XAF' || currency === 'XOF') return 'EUR';
        return 'XAF'
    }

    function nzoneIndicativeRateValue(source, target) {
        return NZONE_INDICATIVE_RATES[source]?.[target] || 1
    }

    function nzoneIndicativeRateLabel(source, target) {
        const rate = nzoneIndicativeRateValue(source, target);
        const decimals = rate % 1 ? 2 : 0;
        if (['XAF', 'XOF'].includes(source) && ['EUR', 'GBP'].includes(target)) {
            return `1 ${target} = ${Number(rate).toLocaleString('fr-FR', {minimumFractionDigits: decimals, maximumFractionDigits: decimals})} ${source}`
        }
        return `1 ${source} = ${Number(rate).toLocaleString('fr-FR', {minimumFractionDigits: decimals, maximumFractionDigits: decimals})} ${target}`
    }

    function nzoneIndicativeReceive(amount, source, target) {
        const rate = nzoneIndicativeRateValue(source, target);
        if (!rate) return 0;
        if (['XAF', 'XOF'].includes(source) && ['EUR', 'GBP'].includes(target)) return amount / rate;
        return amount * rate
    }

    function defaultNzoneRate(currency, target) {
        const rate = nzoneIndicativeRateValue(currency, target);
        return String(rate % 1 ? rate.toFixed(2) : rate)
    }

    function prepareNzoneOperation(type, force = false) {
        const meta = currentNzoneMeta();
        if (!meta) return;
        const target = defaultNzoneTarget(meta.currency);
        if (!force && nzoneOperation.type === type && nzoneOperation.currency === meta.currency) return;
        nzoneOperation = {
            type,
            currency: meta.currency,
            step: 'form',
            amount: String(meta.min),
            method: meta.methods[0] || '',
            target,
            rate: defaultNzoneRate(meta.currency, target)
        }
    }

    function startNzoneOperation(type) {
        prepareNzoneOperation(type, true);
        go(nzoneOperationRoute(type))
    }

        nzoneOperation.amount = String(value || '').replace(/[^\d.]/g, '');

        if (!meta) return;
        const amount = Number(nzoneOperation.amount) || 0;
        const hint = document.getElementById('nzoneOpAmountHint');
        const button = document.getElementById('nzoneOpSubmit');
        const invalid = amount < meta.min;
        if (hint) {
            hint.textContent = invalid ? `Minimum : ${xamount(meta.min, meta.currency)}` : `Minimum requis : ${xamount(meta.min, meta.currency)}`;
            hint.classList.toggle('error', invalid)
        }
        if (current === 'nzoneSell') refreshNzoneSellComputedFields();
        if (button) button.disabled = invalid || (nzoneOperation.type === 'sell' ? (!nzoneOperation.target || !nzoneOperation.rate) : !nzoneOperation.method)
    }

        nzoneOperation.method = method;

    }

        nzoneOperation[key] = String(value || '');
