            nzoneOperation.rate = defaultNzoneRate(nzoneOperation.currency, nzoneOperation.target);
            if (current === 'nzoneSell') go('nzoneSell');
            return
        }
        const meta = currentNzoneMeta();
        const button = document.getElementById('nzoneOpSubmit');
        if (button && meta) button.disabled = (Number(nzoneOperation.amount) || 0) < meta.min || !nzoneOperation.target || !nzoneOperation.rate
    }

    function switchNzoneSellSource(currency) {
        if (!currency) return;
        currentNzone = currency;
        prepareNzoneOperation('sell', true);
        go('nzoneSell')
    }

    function nzoneSellSourcePicker() {
        const summary = nzoneDetailData(currentNzone);
        const options = openedNzoneCurrencies().map(currency => {
            const data = nzoneDetailData(currency);
            return `<button class="nzone-picker-option ${currency === currentNzone ? 'selected' : ''}" type="button" onclick="switchNzoneSellSource('${currency}')"><div class="nzone-picker-line"><b>${data.name}</b><span>${currency}</span></div><small>${data.balance}</small></button>`
        }).join('');
        return `<details class="nzone-picker"><summary><div class="nzone-picker-summary"><span class="nzone-picker-title">${summary.name}</span><span class="nzone-picker-meta">${summary.balance}</span></div></summary><div class="nzone-picker-options">${options}</div></details>`
    }

    function nzoneSellTargetPicker(meta) {
        const targetMeta = nzoneMeta(nzoneOperation.target) || nzoneMeta(defaultNzoneTarget(meta.currency));
        const options = NZONE_CORRIDORS.filter(zone => zone.currency !== meta.currency).map(zone => `<button class="nzone-picker-option ${nzoneOperation.target === zone.currency ? 'selected' : ''}" type="button" onclick="setNzoneSellField('target', '${zone.currency}')"><div class="nzone-picker-line"><b>${zone.flag} ${zone.currency}</b><span>${zone.country}</span></div><small>${zone.name}</small></button>`).join('');
        return `<details class="nzone-picker"><summary><div class="nzone-picker-summary"><span class="nzone-picker-title">${targetMeta.flag} ${targetMeta.currency}</span><span class="nzone-picker-meta">${targetMeta.name} · ${targetMeta.country}</span></div></summary><div class="nzone-picker-options">${options}</div></details>`
    }

    function nzoneSellComputedReceive(meta = currentNzoneMeta()) {
        if (!meta || !nzoneOperation.target) return '';
        const amount = Number(nzoneOperation.amount) || 0;
        return xamount(nzoneIndicativeReceive(amount, meta.currency, nzoneOperation.target), nzoneOperation.target)
    }

    function refreshNzoneSellComputedFields() {
        const meta = currentNzoneMeta();
        const receive = document.getElementById('nzoneSellReceiveValue');
        const rate = document.getElementById('nzoneSellRateValue');
        if (receive) receive.textContent = nzoneSellComputedReceive(meta);
        if (rate) rate.textContent = nzoneIndicativeRateLabel(meta.currency, nzoneOperation.target)
    }

    function nzoneOperationRef(meta, type) {
        const prefix = type === 'withdraw' ? 'WDR' : type === 'sell' ? 'SELL' : 'DEP';
        return `${prefix}-${meta.currency}-${String(Math.max(Number(nzoneOperation.amount) || meta.min, meta.min)).padStart(4, '0')}`
    }

    function nzonePaymentInstruction(method, meta, type) {
        const action = type === 'withdraw' ? 'retrait' : 'dépôt';
        if (!method) return `<div class="checkout-detail"><b>Sélectionne un canal</b><span>Le portail affichera les instructions adaptées au pays.</span></div>`;
        if (/Orange|MTN|Wave/i.test(method)) return `<div class="checkout-detail"><b>${method}</b><span>Entre ton numéro ${meta.country}, puis valide le ${action} sur ton téléphone.</span></div>`;
        if (/SEPA|Faster/i.test(method)) return `<div class="checkout-detail"><b>Virement bancaire</b><span>Le portail génère une référence à utiliser depuis ta banque.</span></div>`;
        if (/Apple|Google/i.test(method)) return `<div class="checkout-detail"><b>${method}</b><span>Le portail ouvre la validation ${method} pour confirmer l’opération.</span></div>`;
        return `<div class="checkout-detail"><b>Carte bancaire</b><span>Le portail collecte les informations de carte et confirme l’opération.</span></div>`
    }

    function nzoneCheckout(meta, type) {
        const amount = Math.max(Number(nzoneOperation.amount) || meta.min, meta.min);
        const session = type === 'withdraw' ? 'Session de retrait' : 'Session de dépôt';
        const channels = meta.methods.map(method => `<button class="checkout-method ${nzoneOperation.method === method ? 'active' : ''}" type="button" onclick="selectNzoneOperationMethod('${method}')"><b>${paymentMethodIcon(method)} ${method}</b><small>${meta.country}</small></button>`).join('');
        return `<div class="checkout-card"><div class="checkout-top"><div class="checkout-brand"><div class="checkout-mark">N</div><div><b>N-Z0 Checkout</b><span>${session}</span></div></div><span class="tag">${meta.currency}</span></div><div class="checkout-amount">${xamount(amount, meta.currency)}</div><div class="checkout-meta"><div><span>N-zone</span><b>${nzoneDetailData(meta.currency).ref}</b></div><div><span>Référence</span><b>${nzoneOperationRef(meta, type)}</b></div></div><div class="checkout-methods">${channels}</div>${nzonePaymentInstruction(nzoneOperation.method, meta, type)}</div>`
    }

    function nzoneOperationSummary(meta) {
        const data = nzoneDetailData(meta.currency);
        return `<div class="card"><div class="nzone-op-summary"><div class="row"><div class="flag">${data.flag}</div><div class="col"><b>${data.name}</b><span class="small">${data.ref}</span></div></div><span class="tag">${meta.currency}</span></div><span class="nzone-op-hint">Solde disponible : ${data.balance}</span></div>`
    }

    function submitNzoneOperation(type) {
        const meta = currentNzoneMeta();
        if (!meta) return;
        const amount = Number(nzoneOperation.amount) || 0;
        if (amount < meta.min || (type === 'sell' && (!nzoneOperation.target || !nzoneOperation.rate)) || (type !== 'sell' && !nzoneOperation.method)) return;
        nzoneOperation.type = type;
        nzoneOperation.step = 'loading';
        go(nzoneOperationRoute(type));
        clearTimeout(nzoneOperationTimer);
        nzoneOperationTimer = setTimeout(() => {
            nzoneOperation.step = 'success';
            go(nzoneOperationRoute(type))
        }, 1600)
    }

    function nzoneOperationLoadingScreen(type) {
        const label = type === 'sell' ? 'Publication en cours...' : type === 'withdraw' ? 'Retrait en cours...' : 'Dépôt en cours...';
        return `${nzoneFlowHeader(nzoneOperationTitle(type), nzoneDetailData().name)}<div class="card"><div class="xsheet-loading"><div class="xsheet-spinner"></div><div><h3 class="xsheet-title" style="margin-top:0">${label}</h3><p class="xsheet-sub">Simulation du traitement N-Z0.</p></div></div></div>`
    }

    function nzoneOperationSuccessScreen(type) {
        const meta = currentNzoneMeta();
        const amount = xamount(Number(nzoneOperation.amount), meta.currency);
        const title = type === 'sell' ? 'Offre de vente publiée' : type === 'withdraw' ? 'Retrait lancé' : 'Dépôt confirmé';
        const detail = type === 'sell' ? `${amount} proposés contre ${nzoneOperation.target}` : type === 'withdraw' ? `${amount} en cours de retrait` : `${amount} ajoutés à la N-zone`;
        const market = type === 'sell' ? `<button class="btn secondary" onclick="go('xchange')">Voir le marché</button>` : '';
        return `${nzoneFlowHeader(title, nzoneDetailData().name)}<div class="card"><div style="font-size:42px;color:#01bbba;font-weight:950">✓</div><div class="title" style="font-size:21px;margin-top:10px">${title}</div><p class="sub" style="margin-top:10px">${detail}</p><button class="btn primary" style="margin-top:18px" onclick="go('nzoneDetail')">Retour à la N-zone</button>${market}</div>`
    }

    function nzoneCashScreen(type) {
        prepareNzoneOperation(type);
        if (nzoneOperation.step === 'loading') return nzoneOperationLoadingScreen(type);
        if (nzoneOperation.step === 'success') return nzoneOperationSuccessScreen(type);
        const meta = currentNzoneMeta();
        const amount = Number(nzoneOperation.amount) || 0;
        const invalid = amount < meta.min || !nzoneOperation.method;
        const verb = type === 'withdraw' ? 'retirer' : 'déposer';
        const button = type === 'withdraw' ? `Retirer depuis ma N-zone ${meta.currency}` : `Déposer sur ma N-zone ${meta.currency}`;
        return `${nzoneFlowHeader(nzoneOperationTitle(type), nzoneDetailData().name)}${nzoneOperationSummary(meta)}<div class="field"><label>Montant à ${verb}</label><input type="number" min="${meta.min}" value="${nzoneOperation.amount}" oninput="updateNzoneOperationAmount(this.value)"><small id="nzoneOpAmountHint" class="xsheet-hint ${amount < meta.min ? 'error' : ''}">${amount < meta.min ? `Minimum : ${xamount(meta.min, meta.currency)}` : `Minimum requis : ${xamount(meta.min, meta.currency)}`}</small></div>${nzoneCheckout(meta, type)}<div class="card"><button id="nzoneOpSubmit" class="btn primary" onclick="submitNzoneOperation('${type}')" ${invalid ? 'disabled' : ''}>${button}</button><button class="xsheet-link" style="width:100%;margin-top:12px" onclick="go('nzoneDetail')">Annuler</button></div>`
    }

    function nzoneSellTargetOptions(meta) {
        const targets = NZONE_CORRIDORS.filter(zone => zone.currency !== meta.currency).map(zone => `<button class="sell-target ${nzoneOperation.target === zone.currency ? 'active' : ''}" type="button" onclick="setNzoneSellField('target', '${zone.currency}')"><b>${zone.flag} ${zone.currency}</b><span>${zone.country}</span></button>`).join('');
        return `<div class="field"><label>Devise recherchée</label><div class="sell-targets">${targets}</div></div>`
    }

    function nzoneSellScreen() {
        prepareNzoneOperation('sell');
        if (nzoneOperation.step === 'loading') return nzoneOperationLoadingScreen('sell');
        if (nzoneOperation.step === 'success') return nzoneOperationSuccessScreen('sell');
        const meta = currentNzoneMeta();
        const amount = Number(nzoneOperation.amount) || 0;
        const invalid = amount < meta.min || !nzoneOperation.target || !nzoneOperation.rate;
        return `${nzoneFlowHeader('Vendre des devises', nzoneDetailData().name)}<div class="nzone-exchange-field"><label>N-zone source</label>${nzoneSellSourcePicker()}</div><div class="nzone-exchange-field"><label>Je veux vendre</label><div class="nzone-exchange-control"><input type="number" min="${meta.min}" value="${nzoneOperation.amount}" oninput="updateNzoneOperationAmount(this.value)"><span class="nzone-exchange-unit">${meta.currency}</span></div><small id="nzoneOpAmountHint" class="xsheet-hint ${amount < meta.min ? 'error' : ''}">${amount < meta.min ? `Minimum : ${xamount(meta.min, meta.currency)}` : `Minimum requis : ${xamount(meta.min, meta.currency)}`}</small></div><div class="nzone-exchange-field"><label>Contre</label>${nzoneSellTargetPicker(meta)}</div><div class="nzone-exchange-field"><label>Taux indicatif</label><div id="nzoneSellRateValue" class="nzone-exchange-display">${nzoneIndicativeRateLabel(meta.currency, nzoneOperation.target)}</div></div><div class="nzone-exchange-field"><label>Je recevrai</label><div id="nzoneSellReceiveValue" class="nzone-exchange-display">${nzoneSellComputedReceive(meta)}</div></div><div class="nzone-exchange-actions"><button id="nzoneOpSubmit" class="btn primary" onclick="submitNzoneOperation('sell')" ${invalid ? 'disabled' : ''}>Publier mon offre de vente</button><button class="xsheet-link" style="width:100%;margin-top:12px" onclick="go('nzoneDetail')">Annuler</button></div>`
    }

    function openNzoneHeader(sub = 'Ouverture de N-zone') {
        return `<div class="flowhead"><button class="back" onclick="go('wallets')">←</button><div><div class="flowtitle">Ouvrir une N-zone</div><div class="sub">${sub}</div></div></div>`
    }

    function openedNzoneCurrencies() {
        return [...new Set([...BASE_NZONE_CURRENCIES, ...createdNzones.map(zone => zone.currency)])]
    }

    function detectedNzoneCurrency() {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
        const match = NZONE_CORRIDORS.find(zone => zone.timezones.includes(tz));
        if (match) return match.currency;
        if (tz.includes('London')) return 'GBP';
        if (tz.includes('Europe')) return 'EUR';
        if (tz.includes('Dakar')) return 'XOF';
        return 'XAF'
    }

    function resetOpenNzoneFlow() {
        openNzone = {step: 'choose', currency: '', amount: '', method: '', ref: ''}
    }

    function startOpenNzone() {
        resetOpenNzoneFlow();
        go('openNzone')
    }

    function openNzoneKyc() {
        pendingKycAction = 'openNzone';
        go('kyc')
    }

    function nzoneMeta(currency) {
        return NZONE_CORRIDORS.find(zone => zone.currency === currency)
    }

    function selectOpenNzone(currency) {
        const meta = nzoneMeta(currency);
        if (!meta || openedNzoneCurrencies().includes(currency)) return;
        openNzone = {step: 'deposit', currency, amount: String(meta.min), method: '', ref: ''};
        go('openNzone')
    }

    function updateOpenNzoneAmount(value) {
        openNzone.amount = String(value || '').replace(/[^\d.]/g, '');
        const meta = nzoneMeta(openNzone.currency);
        if (!meta) return;
        const amount = Number(openNzone.amount) || 0;
        const hint = document.getElementById('openNzoneAmountHint');
        const button = document.getElementById('openNzoneSubmit');
        const invalid = amount < meta.min;
        if (hint) {
            hint.textContent = invalid ? `Minimum : ${xamount(meta.min, meta.currency)}` : `Minimum requis : ${xamount(meta.min, meta.currency)}`;
            hint.classList.toggle('error', invalid)
        }
        if (button) button.disabled = invalid || !openNzone.method
    }

    function selectOpenNzoneMethod(method) {
        openNzone.method = method;
        go('openNzone')
    }

    function openNzoneCheckoutRef(meta) {
        return `DEP-${meta.currency}-${String(Math.max(Number(openNzone.amount) || meta.min, meta.min)).padStart(4, '0')}`
    }

    function paymentMethodIcon(method) {
        if (/Orange|MTN|Wave/i.test(method)) return '⌁';
        if (/SEPA|Faster/i.test(method)) return '↔';
        if (/Apple|Google/i.test(method)) return '◐';
        return '◆'
    }

    function paymentMethodInstruction(method, meta) {
        if (!method) return `<div class="checkout-detail"><b>Sélectionne un canal</b><span>Le portail affichera les instructions adaptées au pays.</span></div>`;
        if (/Orange|MTN|Wave/i.test(method)) return `<div class="checkout-detail"><b>Instruction ${method}</b><span>Entre ton numéro ${meta.country}, puis valide la demande sur ton téléphone.</span></div>`;
        if (/SEPA|Faster/i.test(method)) return `<div class="checkout-detail"><b>Instruction virement</b><span>Le portail génère une référence de paiement à utiliser depuis ta banque.</span></div>`;
        if (/Apple|Google/i.test(method)) return `<div class="checkout-detail"><b>Instruction wallet</b><span>Le portail ouvre la validation ${method} pour confirmer le dépôt.</span></div>`;
        return `<div class="checkout-detail"><b>Instruction carte</b><span>Le portail collecte les informations de carte et confirme le dépôt.</span></div>`
    }

    function openNzoneCheckout(meta) {
        const amount = Math.max(Number(openNzone.amount) || meta.min, meta.min);
        const channels = meta.methods.map(method => `<button class="checkout-method ${openNzone.method === method ? 'active' : ''}" type="button" onclick="selectOpenNzoneMethod('${method}')"><b>${paymentMethodIcon(method)} ${method}</b><small>${meta.country}</small></button>`).join('');
        return `<div class="checkout-card"><div class="checkout-top"><div class="checkout-brand"><div class="checkout-mark">N</div><div><b>N-Z0 Checkout</b><span>Session de dépôt</span></div></div><span class="tag">${meta.currency}</span></div><div class="checkout-amount">${xamount(amount, meta.currency)}</div><div class="checkout-meta"><div><span>Marchand</span><b>N-Z0</b></div><div><span>Référence</span><b>${openNzoneCheckoutRef(meta)}</b></div></div><div class="checkout-methods">${channels}</div>${paymentMethodInstruction(openNzone.method, meta)}</div>`
    }

    function generatedNzoneRef() {
        const ref = `NZ-${Array.from({length: 15}, () => Math.floor(Math.random() * 10)).join('')}`;
        return ref
    }

    function activateOpenNzone() {
        const meta = nzoneMeta(openNzone.currency);
        if (!meta || !openNzone.method || Number(openNzone.amount) < meta.min) return;
        openNzone.step = 'loading';
        go('openNzone');
        clearTimeout(openNzoneTimer);
        openNzoneTimer = setTimeout(() => {
            const latest = nzoneMeta(openNzone.currency);
            if (!latest) return;
            openNzone.ref = generatedNzoneRef();
            openNzone.step = 'success';
            if (!createdNzones.some(zone => zone.currency === latest.currency)) {
                createdNzones.push({
                    currency: latest.currency,
                    flag: latest.flag,
                    country: latest.country,
                    ref: openNzone.ref,
                    amount: Number(openNzone.amount) || latest.min
                })
            }
            go('openNzone')
        }, 2000)
    }

    function openNzoneCurrencyOption(meta, suggested) {
        const opened = openedNzoneCurrencies().includes(meta.currency);
        const active = openNzone.currency === meta.currency;
        const badges = `${meta.currency === suggested ? '<span class="open-nzone-badge">Suggérée</span>' : ''}${opened ? '<span class="open-nzone-badge muted">Déjà ouverte</span>' : ''}`;
        return `<button class="open-nzone-option ${opened ? 'disabled' : ''} ${active ? 'active' : ''}" type="button" onclick="selectOpenNzone('${meta.currency}')" ${opened ? 'disabled' : ''}><div class="open-nzone-main"><div class="flag">${meta.flag}</div><div><div class="nzone-country">${meta.name}</div><div class="nzone-currency">${meta.country} · minimum ${xamount(meta.min, meta.currency)}</div></div></div><div class="open-nzone-badges">${badges}</div></button>`
    }

    function openNzoneChooseScreen() {
        const suggested = detectedNzoneCurrency();
        const ordered = [...NZONE_CORRIDORS].sort((a, b) => (a.currency === suggested ? -1 : b.currency === suggested ? 1 : 0));
        return `${openNzoneHeader('Choisir la devise')}${ordered.map(meta => openNzoneCurrencyOption(meta, suggested)).join('')}`
    }

    function openNzoneBlockedScreen() {
        return `${openNzoneHeader('Identité requise')}<div class="card"><div style="font-size:34px;margin-bottom:8px">🛡️</div><div class="title" style="font-size:21px">Vérifie ton identité avant d’ouvrir une N-zone</div><p class="sub" style="margin-top:8px">L’ouverture d’une N-zone nécessite un compte validé.</p><button class="btn primary" style="margin-top:18px" onclick="openNzoneKyc()">Vérifier mon identité</button></div>`
    }

    function openNzoneDepositScreen() {
        const meta = nzoneMeta(openNzone.currency);
        if (!meta) return openNzoneChooseScreen();
        const amount = Number(openNzone.amount) || 0;
        const invalid = amount < meta.min || !openNzone.method;
        return `${openNzoneHeader(`Activation ${meta.currency}`)}<div class="card"><div class="row"><div class="row"><div class="flag">${meta.flag}</div><div class="col"><b>N-zone ${meta.currency}</b><span class="small">${meta.country}</span></div></div><span class="tag">${meta.currency}</span></div><p class="sub" style="margin-top:12px">Pour activer ta N-zone ${meta.currency}, effectue un premier dépôt minimum de ${xamount(meta.min, meta.currency)}.</p></div><div class="field"><label>Montant du premier dépôt</label><input type="number" min="${meta.min}" value="${openNzone.amount}" oninput="updateOpenNzoneAmount(this.value)"><small id="openNzoneAmountHint" class="xsheet-hint ${amount < meta.min ? 'error' : ''}">${amount < meta.min ? `Minimum : ${xamount(meta.min, meta.currency)}` : `Minimum requis : ${xamount(meta.min, meta.currency)}`}</small></div>${openNzoneCheckout(meta)}<div class="card"><button id="openNzoneSubmit" class="btn primary" onclick="activateOpenNzone()" ${invalid ? 'disabled' : ''}>Déposer et activer ma N-zone ${meta.currency}</button><button class="xsheet-link" style="width:100%;margin-top:12px" onclick="go('wallets')">Annuler</button></div>`
    }

    function openNzoneLoadingScreen() {
        return `${openNzoneHeader('Activation')}<div class="card"><div class="xsheet-loading"><div class="xsheet-spinner"></div><div><h3 class="xsheet-title" style="margin-top:0">Activation en cours...</h3><p class="xsheet-sub">Création de la N-zone et validation du dépôt.</p></div></div></div>`
    }

    function openNzoneSuccessScreen() {
        const meta = nzoneMeta(openNzone.currency);
        if (!meta) return openNzoneChooseScreen();
        return `${openNzoneHeader('N-zone activée')}<div class="card"><div style="font-size:42px;color:#01bbba;font-weight:950">✓</div><div class="title" style="font-size:21px;margin-top:10px">N-zone ${meta.currency} activée</div><div class="open-nzone-success-ref">${openNzone.ref}</div><p class="sub" style="margin-top:12px">Solde initial : ${xamount(Number(openNzone.amount), meta.currency)}</p><button class="btn primary" style="margin-top:18px" onclick="go('xchange')">Aller sur le marché</button><button class="btn secondary" onclick="go('wallets')">Retour aux N-zones</button></div>`
    }

    function openNzoneScreen() {
        if (kycStatus !== 'verified') return openNzoneBlockedScreen();
        if (openNzone.step === 'loading') return openNzoneLoadingScreen();
        if (openNzone.step === 'success') return openNzoneSuccessScreen();
        if (openNzone.step === 'deposit') return openNzoneDepositScreen();
        return openNzoneChooseScreen()
    }

    function profileKycMeta() {
        if (kycStatus === 'verified') return {className: 'verified', label: 'Identité vérifiée'};
        if (kycStatus === 'pending') return {className: 'pending', label: 'Vérification en cours'};
        return {className: 'unverified', label: 'Identité non vérifiée'}
    }

    function profileEmailMask(value) {
        if (!value) return '';
        if (value.includes('*')) return value;
        const [name, domain] = value.split('@');
        if (!name || !domain) return value;
        const tail = name.length > 1 ? name.slice(-1) : '';
        return `${name.slice(0, 1)}****${tail}@${domain}`
    }

    function profilePhoneMask(value) {
        if (!value) return '';
        if (value.includes('*')) return value;
        const trimmed = String(value).trim();
        const prefix = trimmed.startsWith('+') ? trimmed.split(/\s+/)[0] : '+237';
        const digits = trimmed.replace(/\D/g, '');
        const lead = digits[prefix.replace(/\D/g, '').length] || digits[0] || '6';
        return `${prefix} ${lead}** *** ***`
    }

    function profileFlagForCountry(value) {
        const normalized = String(value || '').trim().toLowerCase();
        const phoneCountry = AUTH_PHONE_COUNTRIES.find(country => country.name.toLowerCase() === normalized);
        if (phoneCountry) return phoneCountry.flag;
        const corridor = NZONE_CORRIDORS.find(zone => zone.country.toLowerCase() === normalized);
        return corridor ? corridor.flag : profileState.flag || '🌍'
    }

    function profileFieldConfig(field) {
        return {
            email: {label: 'Email', title: 'Modifier votre email', submit: 'Envoyer le code de vérification', contact: 'email', inputMode: 'email', inputType: 'email'},
            phone: {label: 'Téléphone', title: 'Modifier votre téléphone', submit: 'Envoyer le code de vérification', contact: 'téléphone', inputMode: 'tel', inputType: 'tel'},
            country: {label: 'Pays de résidence', title: 'Modifier votre pays de résidence', submit: 'Envoyer le code de vérification', contact: 'email', inputMode: 'text', inputType: 'text'}
        }[field]
    }

    function profileDisplayValue(field) {
        if (field === 'country') return `${profileState.country} ${profileState.flag}`;
        return profileState[field]
    }

    function openProfileEditor(field) {
        const config = profileFieldConfig(field);
        if (!config) return;
        profileSheet = {
            field,
            step: 'form',
            value: field === 'country' ? profileState.country : profileState[field],
            password: '',
            message: ''
        };
        if (current === 'profile') go('profile')
    }

    function closeProfileSheet() {
        clearTimeout(profileSheetTimer);
        profileSheet = null;
        if (current === 'profile') go('profile')
    }

    function syncProfileAutoFocus() {
        if (current !== 'profile' || !profileSheet) return;
        const selector = profileSheet.step === 'otp' ? '.profile-otp-digit' : profileSheet.step === 'form' ? '[data-profile-input]' : '';
        if (!selector) return;
        const field = document.querySelector(selector);
        if (field) field.focus()
    }

    function setProfileSheetValue(value) {
        if (!profileSheet) return;
        profileSheet.value = value;
        profileSheet.message = '';
    }

    function setProfileSheetPassword(value) {
        if (!profileSheet) return;
        profileSheet.password = value;
        profileSheet.message = ''
    }

    function profileOtpInputs() {
        return [...document.querySelectorAll('.profile-otp-digit')]
    }

    function profileOtpValue() {
        return profileOtpInputs().map(input => input.value).join('')
    }

    function handleProfileOtpInput(event, index) {
        const cleaned = event.target.value.replace(/\D/g, '').slice(-1);
        event.target.value = cleaned;
        if (profileSheet) profileSheet.message = '';
        if (cleaned && index < profileOtpInputs().length - 1) profileOtpInputs()[index + 1].focus()
    }

    function handleProfileOtpKey(event, index) {
        const inputs = profileOtpInputs();
        if (event.key === 'Backspace' && !event.target.value && index > 0) inputs[index - 1].focus();
        if (event.key === 'ArrowLeft' && index > 0) inputs[index - 1].focus();
        if (event.key === 'ArrowRight' && index < inputs.length - 1) inputs[index + 1].focus()
    }

    function handleProfileOtpPaste(event) {
        const digits = (event.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        if (!digits) return;
        event.preventDefault();
        profileOtpInputs().forEach((input, index) => input.value = digits[index] || '');
        if (profileSheet) profileSheet.message = '';
        profileOtpInputs()[Math.min(digits.length, 5)].focus()
    }

    function applyProfileSheetUpdate() {
        if (!profileSheet) return;
        const field = profileSheet.field;
        const nextValue = String(profileSheet.value || '').trim();
        if (field === 'email') profileState.email = profileEmailMask(nextValue || PROFILE_DATA.email);
        if (field === 'phone') profileState.phone = profilePhoneMask(nextValue || PROFILE_DATA.phone);
        if (field === 'country') {
            profileState.country = nextValue || PROFILE_DATA.country;
            profileState.flag = profileFlagForCountry(profileState.country)
        }
    }

    function sendProfileVerificationCode() {
        if (!profileSheet) return;
        const nextValue = String(profileSheet.value || '').trim();
        if (!nextValue) {
            profileSheet.message = 'Renseignez une valeur avant de continuer.';
            if (current === 'profile') go('profile');
            return
        }
        if (!profileSheet.password.trim()) {
            profileSheet.message = 'Confirmez votre mot de passe.';
            if (current === 'profile') go('profile');
            return
        }
        profileSheet.step = 'loading';
        if (current === 'profile') go('profile');
        clearTimeout(profileSheetTimer);
        profileSheetTimer = setTimeout(() => {
            if (!profileSheet) return;
            profileSheet.step = 'otp';
            profileSheet.message = '';
            if (current === 'profile') go('profile')
        }, 1500)
    }

    function validateProfileOtp() {
        if (!profileSheet) return;
        if (profileOtpValue().length < 6) {
            profileSheet.message = 'Entrez le code complet.';
            if (current === 'profile') go('profile');
            return
        }
        applyProfileSheetUpdate();
        const config = profileFieldConfig(profileSheet.field);
        profileSheet.step = 'success';
        profileSheet.message = `✓ ${config.label} mis à jour`;
        if (current === 'profile') go('profile');
        clearTimeout(profileSheetTimer);
        profileSheetTimer = setTimeout(() => {
            profileSheet = null;
            if (current === 'profile') go('profile')
        }, 1500)
    }

    function setProfileLang(lang) {
        profileState.lang = lang === 'EN' ? 'EN' : 'FR';
        if (current === 'profile') go('profile');
        else applyAppLanguage()
    }

    function setProfileTheme(mode) {
        if (mode !== theme) toggleTheme()
    }

    function startProfileLogout() {
        profileLogoutState = 'loading';
        if (current === 'profile') go('profile');
        clearTimeout(profileLogoutTimer);
        profileLogoutTimer = setTimeout(() => {
            profileLogoutState = '';
            go('auth')
        }, 1500)
    }

    function profileInfoRow(label, value, options = {}) {
        const icon = options.locked
            ? '<span class="profile-row-icon lock" aria-hidden="true">🔒</span>'
            : `<button class="profile-edit-btn" type="button" aria-label="Modifier ${label}" title="Modifier ${label}" onclick="openProfileEditor('${options.field}')">✎</button>`;
        return `<div class="profile-row ${options.locked ? 'disabled' : ''}"><div class="profile-row-main"><span class="profile-row-label">${label}</span><span class="profile-row-value">${value}</span></div>${icon}</div>`
    }

    function profileIdentityCard() {
        const kyc = profileKycMeta();
        return `<div class="card"><div class="profile-identity"><div class="profile-avatar">${profileState.initials}</div><div class="profile-identity-copy"><div class="profile-name">${profileState.name}</div><div class="profile-email">${profileState.email}</div><span class="profile-kyc ${kyc.className}">${kyc.label}</span></div></div></div>`
    }

    function profileInfoCard() {
        return `<div class="section">Mes informations</div><div class="profile-card">${profileInfoRow('Nom complet', profileState.name, {locked: true})}${profileInfoRow('Date de naissance', profileState.birthdate, {locked: true})}${profileInfoRow('Email', profileState.email, {field: 'email'})}${profileInfoRow('Téléphone', profileState.phone, {field: 'phone'})}${profileInfoRow('Pays de résidence', `${profileState.country} ${profileState.flag}`, {field: 'country'})}</div>`
    }

    function profileSettingsCard() {
        const isLight = theme === 'light';
        return `<div class="section">Paramètres</div><div class="profile-card"><div class="profile-setting"><div><div class="profile-setting-title">Langue</div></div><div class="profile-segment"><button class="${profileState.lang === 'FR' ? 'active' : ''}" type="button" onclick="setProfileLang('FR')">FR</button><button class="${profileState.lang === 'EN' ? 'active' : ''}" type="button" onclick="setProfileLang('EN')">EN</button></div></div><div class="profile-setting"><div><div class="profile-setting-title">Apparence</div></div><div class="profile-segment"><button class="${!isLight ? 'active' : ''}" type="button" onclick="setProfileTheme('dark')">☾ Sombre</button><button class="${isLight ? 'active' : ''}" type="button" onclick="setProfileTheme('light')">☀ Clair</button></div></div></div>`
    }

    function profileSessionBlock() {
        const status = profileLogoutState === 'loading' ? '<div class="profile-logout-status">Déconnexion en cours...</div>' : '';
        return `<div class="profile-session"><button class="profile-logout" type="button" onclick="startProfileLogout()">Se déconnecter</button>${status}</div>`
    }

    function profileSheetBody() {
        if (!profileSheet) return '';
        const config = profileFieldConfig(profileSheet.field);
        if (profileSheet.step === 'loading') return `<div class="xsheet-handle"></div><div class="xsheet-loading"><div class="xsheet-spinner"></div><div><h3 class="profile-sheet-title">Envoi en cours</h3><p class="profile-sheet-note">Préparation de la vérification.</p></div></div>`;
        if (profileSheet.step === 'success') return `<div class="xsheet-handle"></div><div class="xsheet-success"><div class="xsheet-success-mark">✓</div><div><h3 class="profile-sheet-title">${config.label} mis à jour</h3><p class="profile-sheet-note">${profileSheet.message}</p></div></div>`;
        if (profileSheet.step === 'otp') {
            const note = `Un code a été envoyé à votre ${config.contact}.`;
            return `<div class="xsheet-handle"></div><h3 class="profile-sheet-title">Vérification</h3><p class="profile-sheet-note">${note}</p><div class="xsheet-field"><span>Code à 6 chiffres</span><div class="auth-otp"><input class="profile-otp-digit" inputmode="numeric" maxlength="1" autocomplete="one-time-code" oninput="handleProfileOtpInput(event, 0)" onkeydown="handleProfileOtpKey(event, 0)" onpaste="handleProfileOtpPaste(event)"><input class="profile-otp-digit" inputmode="numeric" maxlength="1" oninput="handleProfileOtpInput(event, 1)" onkeydown="handleProfileOtpKey(event, 1)"><input class="profile-otp-digit" inputmode="numeric" maxlength="1" oninput="handleProfileOtpInput(event, 2)" onkeydown="handleProfileOtpKey(event, 2)"><input class="profile-otp-digit" inputmode="numeric" maxlength="1" oninput="handleProfileOtpInput(event, 3)" onkeydown="handleProfileOtpKey(event, 3)"><input class="profile-otp-digit" inputmode="numeric" maxlength="1" oninput="handleProfileOtpInput(event, 4)" onkeydown="handleProfileOtpKey(event, 4)"><input class="profile-otp-digit" inputmode="numeric" maxlength="1" oninput="handleProfileOtpInput(event, 5)" onkeydown="handleProfileOtpKey(event, 5)"></div></div><div class="profile-sheet-message ${profileSheet.message ? '' : 'auth-hidden'}">${profileSheet.message || ''}</div><div class="xsheet-actions"><button class="btn primary" type="button" onclick="validateProfileOtp()">Valider</button><button class="xsheet-link" type="button" onclick="closeProfileSheet()">Annuler</button></div>`
        }
        return `<div class="xsheet-handle"></div><h3 class="profile-sheet-title">${config.title}</h3><label class="xsheet-field"><span>${config.label}</span><div class="xsheet-input"><input data-profile-input type="${config.inputType}" inputmode="${config.inputMode}" value="${profileSheet.value}" oninput="setProfileSheetValue(this.value)"></div></label><label class="xsheet-field"><span>Confirmez votre mot de passe</span><div class="xsheet-input"><input type="password" value="${profileSheet.password}" oninput="setProfileSheetPassword(this.value)"></div></label><div class="profile-sheet-message ${profileSheet.message ? '' : 'auth-hidden'}">${profileSheet.message || ''}</div><div class="xsheet-actions"><button class="btn primary" type="button" onclick="sendProfileVerificationCode()">${config.submit}</button><button class="xsheet-link" type="button" onclick="closeProfileSheet()">Annuler</button></div>`
    }

    function profileSheetView() {
        if (!profileSheet) return '';
        return `<div class="xsheet-layer"><button class="xsheet-scrim" type="button" onclick="closeProfileSheet()" aria-label="Fermer"></button><section class="xsheet-panel profile-sheet-panel" role="dialog" aria-modal="true">${profileSheetBody()}</section></div>`
    }

    function profileScreen() {
        return `${header('Profil', 'Compte & préférences')}<div class="section">Identité</div>${profileIdentityCard()}${profileInfoCard()}${profileSettingsCard()}${profileSessionBlock()}${profileSheetView()}`
    }

    function setXchangeMode(mode) {
        xchangeMode = mode === 'sell' ? 'sell' : 'buy';
        if (current === 'xchange') go('xchange')
    }

    function setXchangeFilter(key, value) {
        if (!xchangeFilterState[xchangeMode] || !(key in xchangeFilterState[xchangeMode])) return;
        xchangeFilterState[xchangeMode][key] = value;
        if (current === 'xchange') go('xchange')
    }

    function findXchangeOffer(offerId) {
        return [...XCHANGE_OFFERS.buy, ...XCHANGE_OFFERS.sell].find(offer => offer.id === offerId)
    }

    function xamount(value, currency) {
        const numeric = Number(value) || 0;
        const decimals = ['XAF', 'XOF'].includes(currency) ? 0 : numeric % 1 ? 2 : 0;
        return `${numeric.toLocaleString('fr-FR', {maximumFractionDigits: decimals})} ${currency}`
    }

    function xrateText(trade, rate = trade.rateValue) {
        const decimals = rate % 1 ? 2 : 0;
        return `${Number(rate).toLocaleString('fr-FR', {maximumFractionDigits: decimals})} ${trade.quoteCurrency} pour 1 ${trade.baseCurrency}`
    }

    function xsheetInitialAmount(type, trade) {
        if (type === 'sell') return trade.requiredAmount;
        return trade.defaultAmount || trade.minAmount
    }

    function xsheetIsPurchaseFlow() {
        return xchangeSheet && ['buy', 'negotiate'].includes(xchangeSheet.type)
    }

    function xsheetNormalizeNzoneNumber(value) {
        const digits = String(value || '').replace(/\D/g, '').slice(0, 15);
        return digits ? `NZ-${digits}` : ''
    }

    function xsheetNzoneIsFormatted(value) {
        return /^NZ-\d{15}$/.test(xsheetNormalizeNzoneNumber(value))
    }

    function xsheetNzonePreview(offer) {
        const number = xsheetNormalizeNzoneNumber(xchangeSheet?.beneficiaryNzone);
        if (!number || !xsheetNzoneIsFormatted(number)) return null;
        return {owner: 'Nadia Mbarga', currency: offer.trade.baseCurrency, number}
    }

    function xsheetCreditTarget(offer) {
        const zone = offer.trade.credit;
        if (!xsheetIsPurchaseFlow() || xchangeSheet.beneficiary !== 'other') return `ta ${zone}`;
        const found = xsheetNzonePreview(offer);
        return found ? `la ${zone} de ${found.owner}` : `la ${zone} du bénéficiaire`
    }

    function xsheetBeneficiaryError() {
        if (!xsheetIsPurchaseFlow() || xchangeSheet.beneficiary !== 'other') return '';
        const number = xsheetNormalizeNzoneNumber(xchangeSheet.beneficiaryNzone);
        if (!number) return 'Renseigne le numéro de N-zone.'
        if (!xsheetNzoneIsFormatted(number)) return '15 chiffres attendus après NZ-.'
        return ''
    }

    function xsheetBeneficiaryCard(offer) {
        if (!xsheetIsPurchaseFlow() || xchangeSheet.beneficiary !== 'other') return '';
        const number = xsheetNormalizeNzoneNumber(xchangeSheet.beneficiaryNzone);
        if (!number) return '';
        const found = xsheetNzonePreview(offer || findXchangeOffer(xchangeSheet.offerId));
        const error = xsheetBeneficiaryError();
        if (!found) return `<div id="xsheetBeneficiaryCard" class="xsheet-beneficiary-card error"><div><b>Format non valide</b><span>${number || 'NZ-'}</span></div><span>15 chiffres</span></div>`;
        return `<div id="xsheetBeneficiaryCard" class="xsheet-beneficiary-card ${error ? 'error' : ''}"><div><b>${found.owner}</b><span>${number}</span></div><div style="text-align:right"><b>${found.currency}</b><span>Devise</span></div></div>`
    }

    function xsheetComputed(offer, amount = xchangeSheet?.amount, rate = xchangeSheet?.rate) {
        const trade = offer.trade;
        const baseAmount = Number(amount) || 0;
        const usedRate = Number(rate || trade.rateValue) || trade.rateValue;
        return {
            send: xchangeSheet?.type === 'buy' ? xamount(baseAmount * usedRate, trade.quoteCurrency) : xamount(baseAmount, trade.baseCurrency),
            receive: xchangeSheet?.type === 'sell' ? xamount(baseAmount * usedRate, trade.quoteCurrency) : xamount(baseAmount, trade.baseCurrency),
            rate: xrateText(trade, usedRate)
        }
    }

    function xsheetAmountError(offer, amount = xchangeSheet?.amount) {
        const trade = offer.trade;
        const value = Number(amount) || 0;
        if (xchangeSheet?.type === 'sell') {
            const available = XCHANGE_BALANCES[trade.baseCurrency] || 0;
            if (available < trade.requiredAmount) return `Solde insuffisant : ${xamount(available, trade.baseCurrency)} disponible.`;
            return value < trade.requiredAmount ? `Minimum requis : ${xamount(trade.requiredAmount, trade.baseCurrency)}.` : ''
        }
        if (value < trade.minAmount) return `Minimum disponible : ${xamount(trade.minAmount, trade.baseCurrency)}.`;
        if (value > trade.maxAmount) return `Maximum disponible : ${xamount(trade.maxAmount, trade.baseCurrency)}.`;
        return ''
    }

    function syncXsheetPreview() {
        if (!xchangeSheet) return;
        const offer = findXchangeOffer(xchangeSheet.offerId);
        if (!offer) return;
        const computed = xsheetComputed(offer);
        const send = document.getElementById('xsheetSend');
        const receive = document.getElementById('xsheetReceive');
        const rate = document.getElementById('xsheetRate');
        const hint = document.getElementById('xsheetAmountHint');
        const beneficiaryHint = document.getElementById('xsheetBeneficiaryHint');
        const beneficiaryCard = document.getElementById('xsheetBeneficiaryCardSlot');
        const creditTarget = document.getElementById('xsheetCreditTarget');
        const submit = document.getElementById('xsheetSubmit');
        if (send) send.textContent = computed.send;
        if (receive) receive.textContent = computed.receive;
        if (rate) rate.textContent = computed.rate;
        const error = xsheetAmountError(offer);
        const beneficiaryError = xsheetBeneficiaryError();
        if (hint) {
            hint.textContent = error || hint.dataset.default || '';
            hint.classList.toggle('error', Boolean(error))
        }
        if (beneficiaryHint) {
            beneficiaryHint.textContent = beneficiaryError || beneficiaryHint.dataset.default || '';
            beneficiaryHint.classList.toggle('error', Boolean(beneficiaryError))
        }
        if (beneficiaryCard) beneficiaryCard.innerHTML = xsheetBeneficiaryCard(offer);
        if (creditTarget) creditTarget.textContent = xsheetCreditTarget(offer);
        if (submit) submit.disabled = Boolean(error || beneficiaryError)
    }

    function updateXsheetAmount(value) {
        if (!xchangeSheet) return;
        xchangeSheet.amount = Number(String(value).replace(',', '.')) || 0;
        syncXsheetPreview()
    }

    function updateXsheetRate(value) {
        if (!xchangeSheet) return;
        xchangeSheet.rate = Number(String(value).replace(',', '.')) || 0;
        syncXsheetPreview()
    }

    function setXsheetBeneficiary(value) {
        if (!xchangeSheet) return;
        xchangeSheet.beneficiary = value === 'other' ? 'other' : 'self';
        if (current === 'xchange') go('xchange')
    }

    function updateXsheetBeneficiaryNzone(value) {
        if (!xchangeSheet) return;
        xchangeSheet.beneficiaryNzone = String(value || '').replace(/\D/g, '').slice(0, 15);
        syncXsheetPreview()
    }

    function openXchangeSheet(type, offerId) {
        const offer = findXchangeOffer(offerId);
        if (!offer) return;
        clearTimeout(xchangeSheetTimer);
        xchangeSheet = {
            type,
            offerId,
            stage: 'confirm',
            amount: xsheetInitialAmount(type, offer.trade),
            rate: type === 'negotiate' ? offer.trade.proposedRate : offer.trade.rateValue,
            beneficiary: 'self',
            beneficiaryNzone: ''
        };
        if (current === 'xchange') go('xchange')
    }

    function closeXchangeSheet() {
        clearTimeout(xchangeSheetTimer);
        xchangeSheet = null;
        if (current === 'xchange') go('xchange')
    }

    function submitXchangeSheet() {
        if (!xchangeSheet) return;
        const offer = findXchangeOffer(xchangeSheet.offerId);
        if (offer && xsheetAmountError(offer)) {
            syncXsheetPreview();
            return
        }
        if (xsheetBeneficiaryError()) {
            syncXsheetPreview();
            return
        }
        const type = xchangeSheet.type;
        xchangeSheet.stage = 'loading';
        if (current === 'xchange') go('xchange');
        clearTimeout(xchangeSheetTimer);
        xchangeSheetTimer = setTimeout(() => {
            if (!xchangeSheet || xchangeSheet.type !== type) return;
            if (type === 'negotiate') xchangeNegotiations[xchangeSheet.offerId] = true;
            xchangeSheet.stage = 'success';
            if (current === 'xchange') go('xchange')
        }, 1500)
    }

    function xchangeContext() {
        return `<div class="xchange-context"><div class="xchange-top"><div class="hello">Soldes N-zones</div></div><div class="xzone-wrap"><div class="xzone-slider" aria-label="Soldes N-zones"><div class="xzone-card"><span>N-zone EUR</span><b>240,00 €</b></div><div class="xzone-card"><span>N-zone XAF</span><b>1 250 000 XAF</b></div><div class="xzone-card"><span>N-zone GBP</span><b>640,00 £</b></div><div class="xzone-card"><span>N-zone XOF</span><b>820 000 XOF</b></div></div></div></div>`
    }

    function xchangeToggle() {
        return `<div class="xchange-toggle ${xchangeMode === 'sell' ? 'sell-mode' : 'buy-mode'}"><button type="button" class="${xchangeMode === 'buy' ? 'active' : ''}" onclick="setXchangeMode('buy')">J’achète</button><button type="button" class="${xchangeMode === 'sell' ? 'active' : ''}" onclick="setXchangeMode('sell')">Je vends</button></div>`
    }

    function xchangeFilterPicker(key, label, options) {
        const state = xchangeFilterState[xchangeMode];
        const selected = state[key];
        const rows = options.map(option => `<button class="nzone-picker-option ${option === selected ? 'selected' : ''}" type="button" onclick="setXchangeFilter('${key}', '${option}')"><div class="nzone-picker-line"><b>${option}</b><span>${label}</span></div></button>`).join('');
        return `<details class="nzone-picker xchange-filter-picker"><summary><div class="nzone-picker-summary"><span class="nzone-picker-title">${selected}</span><span class="nzone-picker-meta">${label}</span></div></summary><div class="nzone-picker-options">${rows}</div></details>`
    }

    function xchangeFilters() {
        const pairOptions = xchangeMode === 'buy' ? ['EUR → XAF', 'GBP → XAF', 'EUR → XOF', 'GBP → XOF'] : ['XAF → EUR', 'XAF → GBP', 'XOF → EUR', 'XOF → GBP'];
        const amountOptions = ['50 - 500', '500 - 1 000', '1 000 +'];
        const sortOptions = ['Meilleur taux', 'Plus récent'];
        return `<div class="xsearch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg><input type="search" placeholder="Rechercher devise, pseudo, montant"></div><div class="xfilters-shell"><div class="xfilters">${xchangeFilterPicker('pair', 'Paire', pairOptions)}${xchangeFilterPicker('amount', 'Montant', amountOptions)}${xchangeFilterPicker('sort', 'Tri', sortOptions)}</div></div>`
    }

    function xsheetRow(label, value, note = '') {
        return `<div class="xsheet-row"><span>${label}</span><b>${value}${note ? `<small>${note}</small>` : ''}</b></div>`
    }

    function xsheetPeer(offer, label) {
        const kyc = offer.verified ? '<span class="xsheet-kyc">✓ Vérifié</span>' : '<span class="xsheet-kyc off">Non vérifié</span>';
        return xsheetRow(label, `${offer.peer}${kyc}`)
    }

    function xsheetBeneficiaryField() {
        if (!xsheetIsPurchaseFlow()) return '';
        const other = xchangeSheet.beneficiary === 'other';
        const error = xsheetBeneficiaryError();
        const hint = error || 'Le propriétaire et la devise s’affichent après les 15 chiffres.';
        return `<div class="xsheet-field"><span>Créditer</span><div class="xsheet-choice"><button class="${other ? '' : 'active'}" type="button" onclick="setXsheetBeneficiary('self')">Ma N-zone</button><button class="${other ? 'active' : ''}" type="button" onclick="setXsheetBeneficiary('other')">Autre N-zone</button></div>${other ? `<div class="xsheet-input"><span>NZ-</span><input type="text" inputmode="numeric" maxlength="15" value="${xchangeSheet.beneficiaryNzone || ''}" placeholder="123456789012345" oninput="updateXsheetBeneficiaryNzone(this.value);this.value=xchangeSheet.beneficiaryNzone"></div><small id="xsheetBeneficiaryHint" class="xsheet-hint ${error ? 'error' : ''}" data-default="Le propriétaire et la devise s’affichent après les 15 chiffres.">${hint}</small><div id="xsheetBeneficiaryCardSlot">${xsheetBeneficiaryCard()}</div>` : ''}</div>`
    }

    function xchangeConfirmSheet(type, offer) {
        const trade = offer.trade;
        const isSell = type === 'sell';
        const computed = xsheetComputed(offer);
        const title = isSell ? 'Confirmer la vente' : 'Confirmer l’achat';
        const kicker = isSell ? 'Vente directe' : 'Achat direct';
        const peerLabel = isSell ? 'Acheteur' : 'Vendeur';
        const submitLabel = isSell ? 'Confirmer la vente' : 'Confirmer l’achat';
        const sendLabel = isSell ? 'Devise vendue' : 'Montant à régler';
        const receiveLabel = isSell ? 'Montant encaissé' : 'Devise achetée';
        const sellError = isSell ? xsheetAmountError(offer) : '';
        const beneficiaryError = !isSell ? xsheetBeneficiaryError() : '';
        const amountField = isSell
            ? `<p class="xsheet-sub" style="margin-top:12px">Cette offre demande au minimum ${xamount(trade.requiredAmount, trade.baseCurrency)} disponibles dans ta ${trade.debit}.</p>${sellError ? `<p id="xsheetAmountHint" class="xsheet-hint error">${sellError}</p>` : ''}`
            : `<label class="xsheet-field"><span>Montant à acheter</span><div class="xsheet-input"><input type="number" inputmode="decimal" min="${trade.minAmount}" max="${trade.maxAmount}" value="${xchangeSheet.amount}" oninput="updateXsheetAmount(this.value)"><span>${trade.baseCurrency}</span></div><small id="xsheetAmountHint" class="xsheet-hint" data-default="Disponible : ${xamount(trade.minAmount, trade.baseCurrency)} à ${xamount(trade.maxAmount, trade.baseCurrency)}.">Disponible : ${xamount(trade.minAmount, trade.baseCurrency)} à ${xamount(trade.maxAmount, trade.baseCurrency)}.</small></label>`;
        return `<div class="xsheet-handle"></div><span class="xsheet-kicker">${kicker}</span><h3 class="xsheet-title">${title}</h3>${amountField}${!isSell ? xsheetBeneficiaryField() : ''}<div class="xsheet-summary">${xsheetPeer(offer, peerLabel)}${isSell ? xsheetRow('Minimum demandé', xamount(trade.requiredAmount, trade.baseCurrency)) + xsheetRow('Disponible', xamount(XCHANGE_BALANCES[trade.baseCurrency] || 0, trade.baseCurrency), trade.debit) : xsheetRow('Compte crédité', `<span id="xsheetCreditTarget">${xsheetCreditTarget(offer)}</span>`)}${xsheetRow(sendLabel, `<span id="xsheetSend">${computed.send}</span>`, trade.debit)}${xsheetRow(receiveLabel, `<span id="xsheetReceive">${computed.receive}</span>`, trade.credit)}${xsheetRow('Taux', `<span id="xsheetRate">${computed.rate}</span>`)}</div><div class="xsheet-actions"><button id="xsheetSubmit" class="btn primary" type="button" onclick="submitXchangeSheet()" ${sellError || beneficiaryError ? 'disabled' : ''}>${submitLabel}</button><button class="xsheet-link" type="button" onclick="closeXchangeSheet()">Annuler</button></div>`
    }

    function xchangeNegotiateSheet(offer) {
        const trade = offer.trade;
        const beneficiaryError = xsheetBeneficiaryError();
        return `<div class="xsheet-handle"></div><span class="xsheet-kicker">Proposition de taux</span><h3 class="xsheet-title">Ajuster l’offre</h3><div class="xsheet-summary">${xsheetRow('Taux actuel', xrateText(trade))}${xsheetRow('Compte crédité', `<span id="xsheetCreditTarget">${xsheetCreditTarget(offer)}</span>`)}</div><label class="xsheet-field"><span>Je propose</span><div class="xsheet-input"><input type="number" inputmode="decimal" value="${xchangeSheet.rate}" oninput="updateXsheetRate(this.value)"><span>${trade.quoteCurrency} pour 1 ${trade.baseCurrency}</span></div></label><label class="xsheet-field"><span>Montant souhaité</span><div class="xsheet-input"><input type="number" inputmode="decimal" min="${trade.minAmount}" max="${trade.maxAmount}" value="${xchangeSheet.amount}" oninput="updateXsheetAmount(this.value)"><span>${trade.baseCurrency}</span></div><small id="xsheetAmountHint" class="xsheet-hint" data-default="Disponible : ${xamount(trade.minAmount, trade.baseCurrency)} à ${xamount(trade.maxAmount, trade.baseCurrency)}.">Disponible : ${xamount(trade.minAmount, trade.baseCurrency)} à ${xamount(trade.maxAmount, trade.baseCurrency)}.</small></label>${xsheetBeneficiaryField()}<div class="xsheet-actions"><button id="xsheetSubmit" class="btn primary" type="button" onclick="submitXchangeSheet()" ${beneficiaryError ? 'disabled' : ''}>Envoyer ma proposition</button><button class="xsheet-link" type="button" onclick="closeXchangeSheet()">Annuler</button></div>`
    }

    function xchangeLoadingSheet(type) {
        const text = type === 'negotiate' ? 'Envoi en cours' : 'Traitement en cours';
        const sub = type === 'negotiate' ? 'Envoi de la proposition.' : 'Finalisation de l’opération.';
        return `<div class="xsheet-handle"></div><div class="xsheet-loading"><div class="xsheet-spinner"></div><div><h3 class="xsheet-title" style="margin-top:0">${text}</h3><p class="xsheet-sub">${sub}</p></div></div>`
    }

    function xchangeSuccessSheet(type, offer) {
        const trade = offer.trade;
        const computed = xsheetComputed(offer);
        if (type === 'negotiate') {
            return `<div class="xsheet-handle"></div><div class="xsheet-success"><div class="xsheet-success-mark">✓</div><div><h3 class="xsheet-title">Proposition envoyée</h3><p class="xsheet-sub">${xamount(xchangeSheet.amount, trade.baseCurrency)} proposés à ${xrateText(trade, xchangeSheet.rate)}.</p><p class="xsheet-sub">Crédit prévu sur ${xsheetCreditTarget(offer)}.</p><p class="xsheet-sub">En attente de réponse du vendeur.</p></div><button class="btn primary" type="button" onclick="closeXchangeSheet()">Retour au marché</button></div>`
        }
        const isSell = type === 'sell';
        const title = isSell ? 'Vente confirmée' : 'Échange confirmé';
        const message = isSell ? `${computed.receive} crédités sur ta ${trade.credit}` : `${computed.receive} crédités sur ${xsheetCreditTarget(offer)}`;
        return `<div class="xsheet-handle"></div><div class="xsheet-success"><div class="xsheet-success-mark">✓</div><div><h3 class="xsheet-title">${title}</h3><p class="xsheet-sub">${message}</p></div><button class="btn primary" type="button" onclick="closeXchangeSheet()">Retour au marché</button></div>`
    }

    function xchangeSheetView() {
        if (!xchangeSheet) return '';
        const offer = findXchangeOffer(xchangeSheet.offerId);
        if (!offer) return '';
        let body = '';
        if (xchangeSheet.stage === 'loading') body = xchangeLoadingSheet(xchangeSheet.type);
        else if (xchangeSheet.stage === 'success') body = xchangeSuccessSheet(xchangeSheet.type, offer);
        else body = xchangeSheet.type === 'negotiate' ? xchangeNegotiateSheet(offer) : xchangeConfirmSheet(xchangeSheet.type, offer);
        return `<div class="xsheet-layer"><button class="xsheet-scrim" type="button" onclick="closeXchangeSheet()" aria-label="Annuler"></button><section class="xsheet-panel" role="dialog" aria-modal="true">${body}</section></div>`
    }

    function offerCard(offer) {
        const modeClass = xchangeMode === 'sell' ? 'sell-mode' : 'buy-mode';
        const badgeLabel = xchangeMode === 'sell' ? 'Recherche d’achat' : 'Offre de vente';
        const badgeIcon = xchangeMode === 'sell'
            ? '<svg viewBox="0 0 24 24"><path d="M7 17 17 7"/><path d="M9 7h8v8"/></svg>'
            : '<svg viewBox="0 0 24 24"><path d="M7 7l10 10"/><path d="M17 9v8H9"/></svg>';
        const actions = xchangeMode === 'sell'
            ? `<div class="offer-actions"><button class="offer-cta" type="button" onclick="openXchangeSheet('sell', '${offer.id}')">Vendre</button></div>`
            : `<div class="offer-actions"><button class="offer-cta" type="button" onclick="openXchangeSheet('buy', '${offer.id}')">Acheter</button><button class="offer-secondary" type="button" onclick="openXchangeSheet('negotiate', '${offer.id}')">Négocier</button></div>`;
        const stateBadge = xchangeNegotiations[offer.id] ? '<div class="offer-state">Proposition envoyée</div>' : '';
        return `<div class="offer-card ${modeClass}"><div class="offer-top"><div class="offer-peer"><div class="peer-avatar">${offer.avatar}</div><div><div class="peer-name">${offer.peer}</div><div class="peer-activity">${offer.activity}</div></div></div><span class="offer-badge ${modeClass}" aria-label="${badgeLabel}" title="${badgeLabel}">${badgeIcon}</span></div>${stateBadge}<div class="offer-rate"><div class="rate-quote"><div class="rate-line"><span class="rate-currency">${offer.quote}</span><strong class="rate-value">${offer.value}</strong></div><span class="rate-unit">${offer.unit}</span></div><span class="offer-eta">${offer.eta}</span></div><div class="offer-foot"><div><div class="offer-pair">${offer.pair}</div><div class="offer-meta">${offer.range}</div></div>${actions}</div></div>`
    }

    function xchangeOffers() {
        const offers = (XCHANGE_OFFERS[xchangeMode] || []).filter(offer => offer.status !== 'expired');
        if (!offers.length) return `<div class="x-empty">Aucune offre disponible pour ce filtre. Vous pouvez poster la vôtre.</div>`;
        return offers.map(offerCard).join('')
    }

    function xchangeScreen() {
        return `${header('NzoXchange', 'Acheter ou Vendre des devises')}${xchangeContext()}${xchangeToggle()}${xchangeFilters()}${xchangeOffers()}${xchangeSheetView()}`
    }

    const views = {
        home: () => {
            const state = kycCopy();
            const identityAction = state.noteCta ? `<div class="card"><button class="btn primary" onclick="go('kyc')">${state.noteCta}</button></div>` : '';
            return `${header('Bonjour Hervé', state.hello)}${homeBalanceHero(state)}${identityAction}<div class="note">${state.note}</div>${homeXchangeBlock()}${homeRecentActivity()}`
        },
        wallets: () => `${header('N-ZONES', 'Vos espaces par pays et devise')}${nzonesList()}<div class="card"><button class="btn primary" onclick="startOpenNzone()">+ Ouvrir une N-zone</button></div>`,
        openNzone: () => openNzoneScreen(),
        nzoneDetail: () => nzoneDetailScreen(),
        nzoneDeposit: () => nzoneCashScreen('deposit'),
        nzoneWithdraw: () => nzoneCashScreen('withdraw'),
        nzoneSell: () => nzoneSellScreen(),
        xchange: () => xchangeScreen(),
        tradeDetail: () => `${flow('Détail de l’offre', 'NzoPX')}<div class="card"><div class="row"><span>Pair</span><b>Amina K.</b></div><div class="row" style="margin-top:12px"><span>Paire</span><b>EUR → XAF</b></div><div class="row" style="margin-top:12px"><span>Taux</span><b>1 EUR = 655,00 XAF</b></div><div class="row" style="margin-top:12px"><span>Publiée</span><b>il y a 15 min</b></div></div><div class="note">Écran de détail uniquement pour la démo. La confirmation de transaction reste hors de cet écran.</div>`,
        createOffer: () => `${flow('Publier une offre', 'CreateOfferScreen')}<div class="field"><label>Type</label><select><option>Je vends</option><option>J’achète</option></select></div><div class="field"><label>Paire</label><select><option>EUR → XAF</option><option>GBP → XAF</option><option>XAF → EUR</option></select></div><div class="field"><label>Montant disponible</label><input value="500"></div><div class="field"><label>Votre taux</label><input value="655.00"></div><div class="card"><button class="btn primary" onclick="go('xchange')">Prévisualiser l’offre</button></div>`,
        fx: () => `${header('Devises', 'Achat & vente, pas trading')}<div class="note">On évite les graphiques agressifs : l’utilisateur choisit simplement acheter ou vendre une devise.</div><div class="actions" style="grid-template-columns:1fr 1fr"><div class="act" onclick="action('buy')"><b>↗</b><span>Acheter devise</span></div><div class="act" onclick="action('sell')"><b>↘</b><span>Vendre devise</span></div></div><div class="card"><div class="row"><span>Taux EUR/XAF</span><b>655,96</b></div><div class="row" style="margin-top:12px"><span>Source</span><span class="tag warn">Officiel fallback</span></div></div>`,
        history: () => `${header('Historique', 'Suivi simple')}<div class="card">${tx('＋', 'Dépôt XAF', 'N-zone Cameroun', '+250 000 XAF')}${tx('↗', 'Vente GBP', 'NzoXchange', '+383 500 XAF')}${tx('↓', 'Retrait XAF', 'N-zone Cameroun', '-80 000 XAF')}</div>`,
        profile: () => profileScreen(),
        kyc: () => kycScreen(),
        deposit: () => `${flow('Dépôt', 'Pays & méthode')}<div class="field"><label>N-zone à créditer</label><select><option>XAF · Cameroun</option><option>EUR · France</option><option>GBP · Royaume-Uni</option></select></div><div class="field"><label>Montant</label><input value="250000"></div><div class="section">Méthodes au Cameroun</div><div class="card">${methods(CM, 1)}</div><div class="section">Méthodes en Europe</div><div class="card">${methods(EU, 0)}</div><div class="card"><button class="btn primary" onclick="go('sd')">Confirmer le dépôt</button></div>`,
        withdraw: () => `${flow('Retrait', 'Destination locale')}<div class="field"><label>N-zone source</label><select><option>XAF · 1 250 000 XAF</option><option>EUR · 2 450,00 €</option></select></div><div class="field"><label>Montant</label><input value="80000"></div><div class="card">${methods(CM, 0)}</div><div class="card"><button class="btn primary" onclick="go('sw')">Confirmer le retrait</button></div>`,
        buy: () => `${flow('Acheter devise', 'Simple et guidé')}<div class="fx"><div class="fxcard"><div class="small">Je paie</div><b>655 960 XAF</b></div><div class="switch">⇄</div><div class="fxcard"><div class="small">Je reçois</div><b>1 000 EUR</b></div></div><div class="card"><div class="row"><span>Taux appliqué</span><b>655,96</b></div><div class="row" style="margin-top:10px"><span>Source</span><span class="tag warn">Officiel fallback</span></div></div><div class="card"><button class="btn primary" onclick="go('sf')">Acheter maintenant</button></div>`,
        sell: () => `${flow('Vendre devise', 'Conversion maîtrisée')}<div class="fx"><div class="fxcard"><div class="small">Je vends</div><b>500 GBP</b></div><div class="switch">⇄</div><div class="fxcard"><div class="small">Je reçois</div><b>383 500 XAF</b></div></div><div class="card"><button class="btn primary" onclick="go('sf')">Vendre maintenant</button></div>`,
        sd: () => success('Dépôt confirmé', 'Votre N-zone sera créditée après confirmation.'),
        sw: () => success('Retrait lancé', 'Le paiement est envoyé vers le moyen local sélectionné.'),
        sf: () => success('Conversion créée', 'La devise achetée ou vendue sera visible dans le compte concerné.')
    };
    authPhoneCountry = detectPhoneCountry();
    populateBirthDateSelects();
    syncAuthIdentifierUi();
    syncLogo();
    syncThemeToggle();
    enableHorizontalScrollAssist();
    enableXchangeFilterMenus();
    window.addEventListener('resize', syncScrollableView);
    go('home');
    showSplash(true);
</script>
</body>
</html>
